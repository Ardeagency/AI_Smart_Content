<!-- 
    INYECCIÓN DE VARIABLES DE SUPABASE
    ===================================
    
    Este código debe ser inyectado por el servidor ANTES de los scripts de Supabase
    en TODAS las páginas HTML (planes.html, login.html, form-record.html, etc.)
    
    El servidor debe reemplazar {{SUPABASE_DATABASE_URL}} y {{SUPABASE_ANON_KEY}}
    con las variables de entorno reales.
    
    EJEMPLO DE USO EN EL SERVIDOR:
    - Leer variables: SUPABASE_DATABASE_URL, SUPABASE_ANON_KEY
    - Inyectar este script antes de <script src="js/supabase-config.js">
-->

<script>
    // Inyectar variables de Supabase desde el servidor
    // El servidor debe reemplazar estos valores con las variables de entorno
    (function() {
        'use strict';
        
        // Leer desde variables del servidor (el servidor debe inyectar estos valores)
        window.SUPABASE_URL = '{{SUPABASE_DATABASE_URL}}' || window.SUPABASE_URL || '';
        window.SUPABASE_ANON_KEY = '{{SUPABASE_ANON_KEY}}' || window.SUPABASE_ANON_KEY || '';
        
        // Si el servidor usa nombres diferentes, también intentar leerlos
        if (!window.SUPABASE_URL && window.SUPABASE_DATABASE_URL) {
            window.SUPABASE_URL = window.SUPABASE_DATABASE_URL;
        }
        
        // Validación silenciosa (solo log en desarrollo)
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
                console.warn('⚠️ Supabase variables not injected by server');
            } else {
                console.log('✅ Supabase variables injected successfully');
            }
        }
    })();
</script>
