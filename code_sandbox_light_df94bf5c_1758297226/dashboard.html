<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - UGC Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            min-height: 100vh;
            background: var(--bg-black);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .dashboard-content {
            text-align: center;
            max-width: 600px;
        }
        
        .dashboard-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 3rem;
            color: white;
            animation: dashboardPulse 3s ease-in-out infinite;
        }
        
        @keyframes dashboardPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 var(--accent-glow); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 30px rgba(253, 98, 79, 0); }
        }
        
        .dashboard-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-primary), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .dashboard-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            line-height: 1.6;
        }
        
        .dashboard-actions {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .dashboard-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .btn-primary-dash {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            box-shadow: 0 10px 30px rgba(253, 98, 79, 0.3);
        }
        
        .btn-primary-dash:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(253, 98, 79, 0.5);
        }
        
        .btn-secondary-dash {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary-dash:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        @media (max-width: 768px) {
            .dashboard-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .dashboard-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Background similar to onboarding -->
    <div class="onboarding-background">
        <div class="bg-gradient-1"></div>
        <div class="bg-gradient-2"></div>
        <div class="bg-grid"></div>
    </div>

    <!-- Dashboard Content -->
    <div class="dashboard-container">
        <div class="dashboard-content">
            <div class="dashboard-icon">
                <i class="fas fa-rocket"></i>
            </div>
            
            <h1 class="dashboard-title">¡Dashboard en Construcción!</h1>
            
            <p class="dashboard-subtitle">
                Tu configuración se ha guardado exitosamente. Estamos construyendo tu dashboard personalizado 
                donde podrás generar contenido UGC increíble con IA avanzada.
            </p>
            
            <div class="dashboard-actions">
                <a href="planes.html" class="dashboard-btn btn-primary-dash">
                    <i class="fas fa-arrow-left"></i>
                    Volver a Planes
                </a>
                <a href="index.html" class="dashboard-btn btn-secondary-dash">
                    <i class="fas fa-home"></i>
                    Ir al Inicio
                </a>
            </div>
        </div>
    </div>
</body>
</html>
