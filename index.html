    <meta name="description" content="Plataforma de generación de contenido con IA desarrollada por Arde Agency">

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>

    <!-- External CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Application CSS (base incluye tema global; rutas absolutas para /org/xxx/...) -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/landing.css">
    <link rel="stylesheet" href="/css/login.css">

    <style>
        /* Estilos base para la SPA */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            color: var(--text-primary);
            background: var(--bg-primary);
            position: relative;
        }

        /* Container para navegación (persistente) */
        #navigation-container {
            position: relative;
            z-index: 1000;
        }

        /* Container principal de la aplicación (dinámico) */
        #app-container {
            position: relative;
            min-height: 100vh;
            width: 100%;
            z-index: 1;
        }

        /* Portal de modales: fuera del scroll, fijo en viewport, centrados */
        #modals-portal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            pointer-events: none;
        }
        #modals-portal > .modal {
            pointer-events: auto;
        }

        /* Animación para cambio de vistas */
        .view-enter {
            animation: fadeIn 0.3s ease forwards;
        }

        .view-leave {
            animation: fadeOut 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
            opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

    </style>
</head>
<body>
    <!-- Spinner global único (mostrar/ocultar vía window.appLoader.showSpinner() / hideSpinner()) -->
    <div class="global-spinner-overlay hidden" id="globalSpinner" aria-hidden="true">
        <div class="global-spinner-circle"></div>
    </div>

    <!-- Navigation Container (Persistente) -->
    <!-- El Navigation component se renderizará aquí -->
    <div id="navigation-container"></div>

    <!-- App Container (Dinámico) -->
    <!-- Las vistas se cargarán aquí dinámicamente -->
    <div id="app-container"></div>

    <!-- Portal de modales: fuera del scroll, centrados en pantalla -->
    <div id="modals-portal" aria-hidden="true"></div>
