<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <base href="/">
    <title>AI Smart Content - Arde Agency</title>
    <meta name="description" content="Plataforma de generación de contenido con IA desarrollada por Arde Agency">
    <link rel="canonical" href="https://aismartcontent.io/">
    <!-- Favicons: predeterminado (tema claro) y versión para tema oscuro -->
    <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicons/favicon-dark.svg" media="(prefers-color-scheme: dark)">
    <meta property="og:url" content="https://aismartcontent.io/">
    <meta property="og:title" content="AI Smart Content - Arde Agency">
    <meta property="og:description" content="Plataforma de generación de contenido con IA desarrollada por Arde Agency">
    <meta property="og:type" content="website">
    
    <!-- Preconnect para optimización -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Application CSS — bundle único (rutas desde raíz para evitar 404 en recargas) -->
    <link rel="stylesheet" href="css/bundle.css">
    
    <style>
        #modals-portal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            pointer-events: none;
        }
        #modals-portal > .modal {
            pointer-events: auto;
        }
    </style>
</head>
<body class="entrance-active">
    <!-- Entrance: rectángulo con degradado (amarillo/verde) + logo -->
    <div class="entrance-overlay" id="entranceOverlay" aria-hidden="true">
        <div class="entrance-animation">
            <div class="entrance-text-block entrance-text-2">
                <div class="entrance-reveal-frame">
                    <span class="entrance-reveal-box" aria-hidden="true"></span>
                    <img src="/recursos/Recursos%20de%20Marca/Recursos/logo-03.svg" alt="AI Smart Content" class="entrance-logo">
                </div>
            </div>
        </div>
    </div>

    <!-- Loader global: solo visible si la landing no ha terminado de renderizar (show/hide vía appLoader) -->
    <div class="loader-overlay loader-overlay--hidden" id="globalSpinner" aria-hidden="true">
        <div class="loader">
            <div class="loader-line"></div>
        </div>
    </div>

    <!-- Fondo de la landing (misma imagen que login, fuera de #app-container) -->
    <div id="landing-background-wrap" class="landing-background" aria-hidden="true"></div>

    <!-- Navigation Container (Persistente) -->
    <!-- El Navigation component se renderizará aquí -->
    <div id="navigation-container"></div>

    <!-- App Container (Dinámico) -->
    <!-- Las vistas se cargarán aquí dinámicamente -->
    <div id="app-container"></div>

    <!-- Portal de modales: fuera del scroll, centrados en pantalla -->
    <div id="modals-portal" aria-hidden="true">
        <!-- Mi cuenta (modal global) -->
        <div
            class="modal account-settings-modal"
            id="accountSettingsModal"
            style="display: none;"
            aria-hidden="true"
            role="dialog"
            aria-modal="true"
            aria-labelledby="accountSettingsModalTitle"
        >
            <div class="modal-overlay" id="accountSettingsModalOverlay"></div>
            <div class="modal-content account-settings-modal-content" role="document">
                <div class="modal-header">
                    <h3 id="accountSettingsModalTitle">Mi cuenta</h3>
                    <button type="button" class="modal-close" id="accountSettingsModalClose" aria-label="Cerrar">&times;</button>
                </div>

                <div class="modal-body account-settings-modal-body">
                    <div class="account-settings-tabs" role="tablist" aria-label="Secciones de mi cuenta">
                        <button type="button" class="account-settings-tab-btn is-active" data-section="account" role="tab" aria-selected="true">
                            Cuenta
                        </button>
                        <button type="button" class="account-settings-tab-btn" data-section="general" role="tab" aria-selected="false">
                            General
                        </button>
                        <button type="button" class="account-settings-tab-btn" data-section="security" role="tab" aria-selected="false">
                            Seguridad
                        </button>
                    </div>

                    <div class="account-settings-panels">
                        <!-- CUENTA -->
                        <section class="account-settings-panel is-active" data-section="account" role="tabpanel">
                            <div class="account-settings-avatar-row">
                                <div class="account-settings-avatar-preview" id="accountSettingsAvatarPreview" aria-label="Avatar"></div>
                                <div class="account-settings-avatar-meta">
                                    <div class="form-group" style="margin-bottom: 0.75rem;">
                                        <label for="accountSettingsFullName">Nombre</label>
                                        <input type="text" class="form-input" id="accountSettingsFullName" placeholder="Tu nombre" autocomplete="name">
                                    </div>
                                    <div class="account-settings-hint" id="accountSettingsDescriptionHint" style="margin-top: 0.25rem;">
                                        Descripción / Avatar: aún no disponibles en la base de datos.
                                    </div>
                                </div>
                            </div>

                            <div class="form-group" style="margin-top: 1rem;">
                                <label for="accountSettingsDescription">Descripción</label>
                                <textarea class="form-textarea" id="accountSettingsDescription" placeholder="(No disponible)" disabled></textarea>
                            </div>

                            <div class="form-group">
                                <label for="accountSettingsAvatarUrl">Avatar (URL)</label>
                                <input type="url" class="form-input" id="accountSettingsAvatarUrl" placeholder="https://..." disabled>
                            </div>

                            <div class="form-group">
                                <label>Organizaciones</label>
                                <div class="account-settings-org-list" id="accountSettingsOrgsList" aria-label="Lista de organizaciones"></div>
                                <div class="account-settings-hint" id="accountSettingsOrgsEmpty" style="display:none;">
                                    No tienes organizaciones asignadas.
                                </div>
                            </div>
                        </section>

                        <!-- GENERAL -->
                        <section class="account-settings-panel" data-section="general" role="tabpanel">
                            <div class="form-group">
                                <label for="accountSettingsLang">Idioma</label>
                                <select class="form-select" id="accountSettingsLang">
                                    <option value="es" selected>Español</option>
                                    <option value="en">English</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Notificaciones</label>
                                <label class="checkbox-label" style="display:flex;align-items:center;gap:0.5rem;">
                                    <input type="checkbox" id="accountSettingsNotifEmail" checked>
                                    <span>Email</span>
                                </label>
                                <label class="checkbox-label" style="display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem;">
                                    <input type="checkbox" id="accountSettingsNotifApp">
                                    <span>En la app</span>
                                </label>
                            </div>

                            <div class="form-group">
                                <label for="accountSettingsTheme">Tema</label>
                                <select class="form-select" id="accountSettingsTheme">
                                    <option value="auto" selected>Automático</option>
                                    <option value="dark">Oscuro</option>
                                    <option value="light">Claro</option>
                                </select>
                            </div>
                        </section>

                        <!-- SEGURIDAD -->
                        <section class="account-settings-panel" data-section="security" role="tabpanel">
                            <div class="form-group">
                                <label>Cambiar contraseña</label>
                                <button type="button" class="btn btn-primary" id="accountSettingsChangePasswordBtn">
                                    <i class="fas fa-key"></i> Ir a cambio de contraseña
                                </button>
                            </div>

                            <div class="form-group">
                                <label>Verificación en 2 pasos</label>
                                <div class="account-settings-security-item">
                                    <div class="account-settings-security-status">
                                        <span id="accountSettings2FAStatus">Pendiente</span>
                                    </div>
                                    <div class="account-settings-security-desc">
                                        Esta opción no está habilitada en este momento.
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="accountSettingsPhone">Número</label>
                                <input type="tel" class="form-input" id="accountSettingsPhone" placeholder="(No disponible)" disabled>
                            </div>

                            <div class="form-group">
                                <label>Login OAuth</label>
                                <div class="account-settings-oauth-grid">
                                    <button type="button" class="btn btn-secondary" id="accountSettingsConnectGoogle" disabled>
                                        Conectar Google
                                    </button>
                                    <button type="button" class="btn btn-secondary" id="accountSettingsConnectFacebook" disabled>
                                        Conectar Facebook
                                    </button>
                                </div>
                                <div class="account-settings-hint" style="margin-top:0.75rem;">
                                    Estas conexiones de OAuth se gestionan en el flujo de integraciones correspondiente.
                                </div>
                            </div>
                        </section>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="accountSettingsCancelBtn">Cerrar</button>
                    <button type="button" class="btn btn-primary" id="accountSettingsSaveBtn">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- External Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- URL base del ai-engine (opcional). Ver js/runtime-config.js -->
    <script src="js/runtime-config.js"></script>
    
    <!-- Core: loader + entrada animada (rutas relativas a <base href="/">) -->
    <script src="js/app-loader.js"></script>
    <script src="js/views/BaseView.js"></script>
    <script src="js/router.js"></script>
    
    <!-- Services (AuthService imprescindible: si falla 404/redirect, el router redirige a onboarding) -->
    <script src="js/services/SupabaseService.js"></script>
    <script src="js/services/AuthService.js"></script>
    <script src="js/services/OrgBrandTheme.js"></script>
    <script src="js/org-url.js"></script>
    <script src="js/services/AppState.js"></script>
    <script src="js/session-utils.js"></script>
    
    <!-- Vistas críticas (landing + login) — el resto se carga lazy por ruta -->
    <script src="js/views/LandingView.js"></script>
    <script src="js/views/SignInView.js"></script>
    
    <!-- Navigation + App init -->
    <script src="js/components/Navigation.js"></script>
    <script src="js/components/AccountSettingsModal.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
