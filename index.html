<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Smart Content - Arde Agency</title>
    <meta name="description" content="Plataforma de generación de contenido con IA desarrollada por Arde Agency">
    
    <!-- Preconnect para optimización -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Application CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/planes.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/hogar.css">
    <link rel="stylesheet" href="css/living.css">
    <link rel="stylesheet" href="css/studio.css">
    <link rel="stylesheet" href="css/products.css">
    <link rel="stylesheet" href="css/form-record.css">
    
    <style>
        /* Estilos base para la SPA */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            color: var(--text-primary);
            background: var(--bg-dark);
            position: relative;
        }

        /* Container para navegación (persistente) */
        #navigation-container {
            position: relative;
            z-index: 1000;
        }

        /* Container principal de la aplicación (dinámico) */
        #app-container {
            position: relative;
            min-height: 100vh;
            width: 100%;
            z-index: 1;
        }

        /* Loading inicial de la aplicación */
        .app-initial-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .app-initial-loading.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .app-loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .app-loading-logo {
            font-size: 4rem;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(0.95);
            }
        }

        .app-loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(236, 235, 218, 0.2);
            border-top-color: var(--accent-warm);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Animación para cambio de vistas */
        .view-enter {
            animation: fadeIn 0.3s ease;
        }

        .view-leave {
            animation: fadeOut 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
            opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-loading-logo {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }
            
            .app-loading-spinner {
                width: 32px;
                height: 32px;
                border-width: 2px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen Inicial -->
    <div class="app-initial-loading" id="appInitialLoading">
        <div class="app-loading-content">
            <div class="app-loading-logo">AI SMART CONTENT</div>
            <div class="app-loading-spinner"></div>
        </div>
    </div>

    <!-- Navigation Container (Persistente) -->
    <!-- El Navigation component se renderizará aquí -->
    <div id="navigation-container"></div>

    <!-- App Container (Dinámico) -->
    <!-- Las vistas se cargarán aquí dinámicamente -->
    <div id="app-container">
        <div class="view-loading" style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        ">
            <div class="loading-spinner" style="
                width: 40px;
                height: 40px;
                border: 3px solid rgba(236, 235, 218, 0.2);
                border-top-color: var(--accent-warm, #e09145);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            "></div>
            <p style="
                margin-top: 1rem;
                color: var(--text-secondary, #a0a0a0);
                font-size: 0.875rem;
            ">Cargando aplicación...</p>
        </div>
    </div>

    <!-- External Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Core Scripts (orden importante) -->
    <script src="js/app-loader.js"></script>
    <script src="js/views/BaseView.js"></script>
    <script src="js/router.js"></script>
    
    <!-- Services (cargar antes de las vistas) -->
    <script src="js/services/SupabaseService.js"></script>
    <script src="js/services/AuthService.js"></script>
    <script src="js/services/AppState.js"></script>
    <script src="js/utils/Performance.js"></script>
    <script src="js/utils/ErrorHandler.js"></script>
    <script src="js/session-utils.js"></script>
    
    <!-- Views (cargar antes de app.js para que estén disponibles) -->
    <script src="js/views/LandingView.js"></script>
    <script src="js/views/PlanesView.js"></script>
    <script src="js/views/FormRecordView.js"></script>
    <script src="js/views/HogarView.js"></script>
    <script src="js/views/LivingView.js"></script>
    <script src="js/views/StudioView.js"></script>
    <script src="js/views/ProductsView.js"></script>
    
    <!-- Components -->
    <script src="js/components/Navigation.js"></script>
    
    <!-- Managers (cargar después de las vistas) -->
    <script src="js/products.js"></script>
    
    <script src="js/app.js"></script>

    <script>
        // Ocultar loading screen inicial cuando la app esté lista
        window.addEventListener('load', function() {
            // Esperar un poco para que la app se inicialice
            setTimeout(function() {
                const loadingScreen = document.getElementById('appInitialLoading');
                if (loadingScreen) {
                    loadingScreen.classList.add('hidden');
                    setTimeout(function() {
                        if (loadingScreen.parentNode) {
                        loadingScreen.style.display = 'none';
                        }
                    }, 500);
                }
            }, 800);
        });

        // También ocultar si la app ya está lista
        if (document.readyState === 'complete') {
            setTimeout(function() {
                const loadingScreen = document.getElementById('appInitialLoading');
                if (loadingScreen) {
                    loadingScreen.classList.add('hidden');
                }
            }, 500);
        }
    </script>
</body>
</html>
