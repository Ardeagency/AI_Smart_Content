<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <base href="/">
    <title>AI Smart Content - Arde Agency</title>
    <meta name="description" content="Plataforma de generación de contenido con IA desarrollada por Arde Agency">
    <link rel="canonical" href="https://aismartcontent.io/">
    <!-- Favicons: predeterminado (tema claro) y versión para tema oscuro -->
    <link rel="icon" type="image/svg+xml" href="/recursos/favicons/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/recursos/favicons/favicon-dark.svg" media="(prefers-color-scheme: dark)">
    <meta property="og:url" content="https://aismartcontent.io/">
    <meta property="og:title" content="AI Smart Content - Arde Agency">
    <meta property="og:description" content="Plataforma de generación de contenido con IA desarrollada por Arde Agency">
    <meta property="og:type" content="website">
    
    <!-- Preconnect — solo orígenes críticos para primera pintura -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <!-- Hero: sin link preload (evita avisos de consola si la ruta no pinta el hero al instante).
         La landing usa la misma URL en CSS/JS; preconnect a Cloudinary ya está arriba. -->

    <!-- Application CSS: un solo stylesheet; los módulos entran vía @import en bundle.css. -->
    <link rel="stylesheet" href="css/bundle.css?v=20260424-vera-maincol-rail">

    <!-- Fuente Inter — pesos reducidos (solo los usados en la UI) + display=swap -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>

    <!-- Space Grotesk — sección Vera dos columnas (#landing-4) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"></noscript>

    <!-- Icon fonts — carga no bloqueante + SRI (si jsdelivr entregara bytes distintos a los
         firmados aquí, el navegador rechaza el CSS: defensa contra compromiso del CDN). -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" media="print" onload="this.media='all'"
          integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous" referrerpolicy="no-referrer">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
          integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous" referrerpolicy="no-referrer"></noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css" media="print" onload="this.media='all'"
          integrity="sha384-6p9AefaqUhEVheRlj1mpAkbngHXy9mbYMrIdcIt4Jlc9lOLIablJq3bBsLOjGwZ7" crossorigin="anonymous" referrerpolicy="no-referrer">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css"
          integrity="sha384-6p9AefaqUhEVheRlj1mpAkbngHXy9mbYMrIdcIt4Jlc9lOLIablJq3bBsLOjGwZ7" crossorigin="anonymous" referrerpolicy="no-referrer"></noscript>
    
    <style>
        #modals-portal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            pointer-events: none;
        }
        #modals-portal > .modal {
            pointer-events: auto;
        }
    </style>
</head>
<body class="entrance-active">
    <!-- Entrance: rectángulo con degradado (amarillo/verde) + logo -->
    <div class="entrance-overlay" id="entranceOverlay" aria-hidden="true">
        <div class="entrance-animation">
            <div class="entrance-text-block entrance-text-2">
                <div class="entrance-reveal-frame">
                    <span class="entrance-reveal-box" aria-hidden="true"></span>
                    <img src="/recursos/logos/logo-03.svg" alt="AI Smart Content" class="entrance-logo" width="320" height="64" fetchpriority="high" decoding="async">
                </div>
            </div>
        </div>
        <!-- Barra de progreso: aparece después del logo, se llena hasta que la web carga -->
        <div class="entrance-progress" id="entranceProgress">
            <div class="entrance-progress__bar" id="entranceProgressBar"></div>
        </div>
    </div>

    <!-- Loader global: solo visible si la landing no ha terminado de renderizar (show/hide vía appLoader) -->
    <div class="loader-overlay loader-overlay--hidden" id="globalSpinner" aria-hidden="true">
        <div class="loader">
            <div class="loader-line"></div>
        </div>
    </div>

    <!-- Fondo de la landing (misma imagen que login, fuera de #app-container) -->
    <div id="landing-background-wrap" class="landing-background" aria-hidden="true"></div>

    <!-- Navigation Container (Persistente) -->
    <!-- El Navigation component se renderizará aquí -->
    <div id="navigation-container"></div>

    <!-- App Container (Dinámico) -->
    <!-- Las vistas se cargarán aquí dinámicamente -->
    <div id="app-container"></div>

    <!-- Public Shell (persistente entre rutas públicas: header + main + footer fuera de app-container para evitar parpadeo) -->
    <div id="public-shell" aria-hidden="true">
      <div id="public-header-root"></div>
      <main id="public-view-content"></main>
      <div id="public-footer-root"></div>
    </div>

    <!-- Portal de modales: fuera del scroll, centrados en pantalla -->
    <div id="modals-portal" aria-hidden="true"></div>

    <!-- External Scripts.
         Chart.js no se carga aquí; otras vistas lo cargan bajo demanda si lo necesitan.
         Supabase JS SDK usa `defer` para no bloquear la primera pintura del hero.
         Versión pinneada + SRI: sin pin, jsdelivr resuelve `@2` a la última minor y el
         SRI rompería en cada release. Con hash fijo, si el CDN sirve bytes distintos el
         navegador rechaza el script (mitiga un compromiso de la supply-chain). -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.2" defer
            integrity="sha384-clqYxV1hjoC1RwoBT11M16mn2I42U4CCZc2QcnjigG/l1lFSxC/zBRAoMxhlrK1Z"
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- URL base del ai-engine (opcional). Ver js/runtime-config.js -->
    <script src="js/runtime-config.js" defer></script>

    <!-- Core: loader + entrada animada (rutas relativas a <base href="/">) -->
    <script src="js/app-loader.js?v=20260416-dual-observer" defer></script>
    <script src="js/views/BaseView.js" defer></script>
    <script src="js/router.js" defer></script>

    <!-- Modal primitiva compartida (window.Modal.show) -->
    <script src="js/utils/modal.js?v=20260417" defer></script>

    <!-- Utilidades de color — fuente única para hexToHSL/hslToHex/hexToRgba/etc.
         Debe cargar ANTES que OrgBrandTheme (que las consume en el theme inicial). -->
    <script src="js/utils/brand-colors.js?v=20260417-split" defer></script>

    <!-- Services (AuthService imprescindible: si falla 404/redirect, el router redirige a onboarding) -->
    <script src="js/services/MiBrandaDataService.js" defer></script>
    <script src="js/services/SupabaseService.js" defer></script>
    <script src="js/services/AuthService.js" defer></script>
    <script src="js/services/OrgBrandTheme.js?v=20260417-split" defer></script>
    <script src="js/org-url.js" defer></script>
    <script src="js/services/AppState.js" defer></script>
    <script src="js/session-utils.js" defer></script>

    <!-- Shell público (header + footer persistentes) — se usa en landing y demás públicas -->
    <script src="js/components/PublicLayout.js?v=20260417-saber-mas" defer></script>
    <script src="js/views/PublicBaseView.js?v=20260414-public-shell" defer></script>

    <!-- Vistas críticas (landing + login) — el resto se carga lazy por ruta -->
    <script src="js/views/LandingView.js?v=20260424-vera-maincol-rail" defer></script>
    <script src="js/views/SignInView.js?v=20260414-inline" defer></script>

    <!-- Navigation (clase base) + mixins extraídos del god-class + App init.
         Los mixins aplican Object.assign sobre Navigation.prototype al cargarse,
         así que deben ir DESPUÉS de Navigation.js. Orden garantizado por `defer`. -->
    <script src="js/components/Navigation.js?v=20260420-notif-modal-global" defer></script>
    <script src="js/components/navigation/Flyouts.mixin.js?v=20260420-notif-modal-global" defer></script>
    <script src="js/components/navigation/Credits.mixin.js?v=20260417-split" defer></script>
    <script src="js/components/navigation/Settings.mixin.js?v=20260417-split" defer></script>
    <script src="js/app.js?v=20260417-brand-assets" defer></script>

</body>
</html>
