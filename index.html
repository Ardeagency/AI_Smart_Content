<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <base href="/">
    <title>AI Smart Content</title>
    <meta name="description" content="Un ecosistema estratégico que analiza el mundo en tiempo real para garantizar que una marca se mantenga siempre relevante, competitiva y proactiva.">
    <!-- noindex: console.aismartcontent.io es la app; el SEO marketing vive en aismartcontent.io (Framer). -->
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://console.aismartcontent.io/">
    <!-- Favicons: predeterminado (tema claro) y versión para tema oscuro -->
    <link rel="icon" type="image/svg+xml" href="/recursos/favicons/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/recursos/favicons/favicon-dark.svg" media="(prefers-color-scheme: dark)">

    <!-- PWA: manifest + theme color + iOS standalone hints. Con el Service
         Worker y HTTPS, los browsers ofrecen "Instalar aplicación" y la
         vuelven app nativa con icono propio. -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0b0b0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Smart">
    <link rel="apple-touch-icon" sizes="180x180" href="/recursos/logos/pwa/logo-app-180.png">
    <!-- Splash de arranque: precargar el wordmark para que aparezca en la primera pintura
         (sin parpadeo). Es el logo que se ve mientras la app resuelve auth + ruta. -->
    <link rel="preload" as="image" href="/recursos/logos/logo-03.svg">
    <!-- Open Graph -->
    <meta property="og:site_name" content="AI Smart Content">
    <meta property="og:locale" content="es_CO">
    <meta property="og:url" content="https://console.aismartcontent.io/">
    <meta property="og:title" content="AI Smart Content">
    <meta property="og:description" content="Un ecosistema estratégico que analiza el mundo en tiempo real para garantizar que una marca se mantenga siempre relevante, competitiva y proactiva.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://console.aismartcontent.io/recursos/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="AI Smart Content — ecosistema estratégico que analiza el mundo en tiempo real para mantener tu marca relevante, competitiva y proactiva">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI Smart Content">
    <meta name="twitter:description" content="Un ecosistema estratégico que analiza el mundo en tiempo real para garantizar que una marca se mantenga siempre relevante, competitiva y proactiva.">
    <meta name="twitter:image" content="https://console.aismartcontent.io/recursos/og-image.png">

    <!-- Preconnect — orígenes críticos para primera pintura y primera API call.
         preconnect: abre handshake TCP+TLS ya (ahorra ~200-400ms en LTE).
         dns-prefetch: solo resolución DNS (más barato; suficiente para libs). -->
    <link rel="preconnect" href="https://tsdpbqcwjckbfsdqacam.supabase.co" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <!-- Application CSS: un solo stylesheet; los módulos entran vía @import en bundle.css. -->
    <link rel="stylesheet" href="css/bundle.css?v=__BUILD_ID__">

    <!-- Font Awesome — SUBSET local: solo los 155 íconos usados en la app.
         Reemplaza el CDN @fortawesome/fontawesome-free (102 KB CSS + 252 KB woff2)
         por ~7 KB CSS + ~14 KB woff2 self-hosted. Ahorro ~95% del peso de íconos. -->
    <link rel="preload" href="/recursos/fonts/fa/solid.subset.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/css/fa-subset.css?v=__BUILD_ID__">
    <!-- Phosphor Icons — SUBSET local: 61 íconos efectivamente usados.
         Reemplaza CDN @phosphor-icons/web (~78 KB CSS + ~147 KB woff2)
         por ~3 KB CSS + ~7 KB woff2. Ahorro ~95%. -->
    <link rel="stylesheet" href="/css/phosphor-subset.css?v=__BUILD_ID__">
    
    <style>
        /* Critical CSS: evita FOUC (flash blanco) mientras carga bundle.css.
           Solo lo absolutamente necesario para el primer paint coherente:
           fondo oscuro, tipografía, layout de modales portal. */
        :root {
            color-scheme: dark;
        }
        html, body {
            margin: 0;
            padding: 0;
            background: #0b0b0b;
            color: #D4D1D8;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body {
            min-height: 100vh;
            overflow-x: hidden;
        }
        #app-container, #navigation-container {
            background: #0b0b0b;
        }
        /* ===== Splash de arranque =====
           Cubre TODO (header + contenido + barra de progreso) mientras la app
           resuelve sesión y ruta. Evita ver el header a medio pintar, el
           "Redirigiendo..." y el fondo dinámico sin cargar. Vive en el critical
           CSS para que anime desde la primera pintura, antes de bundle.css. */
        #app-splash {
            position: fixed;
            inset: 0;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            background: #0b0b0b;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        #app-splash.app-splash--hide {
            opacity: 0;
            pointer-events: none;
        }
        #app-splash .app-splash-logo {
            width: min(280px, 56vw);
            height: auto;
            opacity: 0;
            transform: translateY(8px) scale(0.985);
            animation: appSplashLogoIn 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }
        #app-splash .app-splash-bar {
            position: relative;
            width: min(220px, 46vw);
            height: 2px;
            border-radius: 2px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            opacity: 0;
            animation: appSplashFadeIn 0.6s ease 0.35s forwards;
        }
        /* Segmento que se desliza = gradiente de marca de la plataforma (el
           espectro completo de AI Smart Content). Hardcodeado porque el splash
           pinta antes de bundle.css, donde se define --brand-gradient. */
        #app-splash .app-splash-bar::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: 45%;
            border-radius: 2px;
            background: linear-gradient(90deg, #ff0000 0%, #ff6500 12.5%, #ffe500 25%, #9acc00 37.5%, #00d614 50%, #00e7ff 62.5%, #0018ee 75%, #5b00ea 87.5%, #900090 100%);
            animation: appSplashSlide 1.15s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes appSplashLogoIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes appSplashFadeIn {
            to { opacity: 1; }
        }
        @keyframes appSplashSlide {
            0%   { transform: translateX(-110%); }
            100% { transform: translateX(240%); }
        }
        @media (prefers-reduced-motion: reduce) {
            #app-splash .app-splash-logo { animation: none; opacity: 1; transform: none; }
            #app-splash .app-splash-bar::before { animation-duration: 2.2s; }
        }
        #modals-portal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            pointer-events: none;
        }
        #modals-portal > .modal {
            pointer-events: auto;
        }
        /* Skip link: oculto fuera del viewport hasta recibir focus. */
        .skip-to-content {
            position: fixed;
            top: 8px;
            left: 8px;
            z-index: 3000;
            padding: 8px 16px;
            background: #141517;
            color: #D4D1D8;
            border: 1px solid #242424;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.875rem;
            transform: translateY(-200%);
            transition: transform 180ms cubic-bezier(0.33, 0, 0.2, 1);
        }
        .skip-to-content:focus {
            transform: translateY(0);
            outline: 2px solid rgba(255, 255, 255, 0.35);
            outline-offset: 2px;
        }
        /* Toast: contenedor + items. aria-live ya en el container vía JS. */
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 3500;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 360px;
        }
        .toast {
            pointer-events: auto;
            padding: 12px 16px;
            background: #141517;
            color: #D4D1D8;
            border: 1px solid #242424;
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
            font-size: 0.875rem;
            line-height: 1.4;
            cursor: pointer;
            opacity: 0;
            transform: translateX(20px);
            transition: opacity 200ms cubic-bezier(0.33, 0, 0.2, 1),
                        transform 200ms cubic-bezier(0.33, 0, 0.2, 1);
        }
        .toast--enter { opacity: 1; transform: translateX(0); }
        .toast--leave { opacity: 0; transform: translateX(20px); }
        .toast--error   { border-color: rgba(255, 0, 0, 0.6); color: #ff8a8a; }
        .toast--warning { border-color: rgba(255, 229, 0, 0.6); color: #ffe899; }
        .toast--success { border-color: rgba(0, 214, 20, 0.6); color: #8af0a3; }
        /* Móvil: toasts a ancho completo (right:16px + max-width:360px se desborda en 360px). */
        @media (max-width: 480px) {
            .toast-container {
                top: auto;
                bottom: 16px;
                left: 12px;
                right: 12px;
                max-width: none;
            }
            .toast { transform: translateY(20px); }
            .toast--enter { transform: translateY(0); }
            .toast--leave { transform: translateY(20px); }
        }
    </style>
</head>
<body>
    <!-- Splash de arranque: tapa el header a medio pintar + "Redirigiendo..." +
         fondo dinámico sin cargar durante el boot frío. Se descarta solo cuando
         la app aterriza en una vista real (no en una de redirección). -->
    <div id="app-splash" role="status" aria-live="polite" aria-label="Cargando AI Smart Content">
      <img src="/recursos/logos/logo-03.svg" alt="AI Smart Content" class="app-splash-logo" width="280" height="29">
      <div class="app-splash-bar" aria-hidden="true"></div>
    </div>
    <script>
      // Descarte del splash. El router emite 'routechange' al terminar de pintar
      // cada vista, incluida la cadena de redirección de arranque
      // ('/' -> '/home' -> '/org/.../dashboard'). Mantenemos el splash sobre las
      // vistas de redirección y lo quitamos al llegar a la primera vista real.
      (function () {
        var REDIRECT_PATHS = { '/': 1, '/home': 1, '/hogar': 1 };
        var splash = document.getElementById('app-splash');
        if (!splash) return;
        var done = false;
        function dismiss() {
          if (done) return;
          done = true;
          window.removeEventListener('routechange', onRoute);
          splash.classList.add('app-splash--hide');
          var remove = function () { if (splash && splash.parentNode) splash.parentNode.removeChild(splash); };
          splash.addEventListener('transitionend', remove, { once: true });
          // Failsafe por si transitionend no dispara (tab en background, etc.).
          setTimeout(remove, 800);
        }
        function onRoute(e) {
          var p = (e && e.detail && e.detail.path) || window.location.pathname || '/';
          if (p.length > 1 && p.charAt(p.length - 1) === '/') p = p.slice(0, -1);
          if (!REDIRECT_PATHS[p]) dismiss();
        }
        // Exponer para que el bootstrap lo llame si pinta una pantalla de error.
        window.__appSplashDismiss = dismiss;
        window.addEventListener('routechange', onRoute);
        // Failsafe absoluto: nunca dejar al usuario atrapado tras el splash.
        setTimeout(dismiss, 10000);
      })();
    </script>

    <!-- Fallback para usuarios con JavaScript deshabilitado. La app es una
         SPA y no funciona sin JS; este mensaje es la única forma de
         comunicarlo si el bundle no se ejecuta. -->
    <noscript>
      <div style="padding: 32px; max-width: 480px; margin: 64px auto; text-align: center; background: #141517; border: 1px solid #242424; border-radius: 12px; color: #D4D1D8; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
        <h1 style="font-size: 1.25rem; margin: 0 0 12px;">AI Smart Content requiere JavaScript</h1>
        <p style="margin: 0 0 8px;">Esta aplicación es una experiencia interactiva que necesita JavaScript habilitado para funcionar.</p>
        <p style="margin: 0; font-size: 0.875rem; color: rgba(212, 209, 216, 0.6);">Activa JavaScript en tu navegador y recarga la página.</p>
      </div>
    </noscript>

    <!-- Skip link: keyboard/screen-reader users pueden saltarse el sidebar
         y caer directo en el contenido de la vista. Visible solo cuando
         recibe focus (Tab desde el inicio). -->
    <a href="#app-container" class="skip-to-content">Saltar al contenido</a>

    <!-- Barra de progreso de navegacion (estilo NProgress): feedback no-bloqueante
         en cambios de ruta. La vista anterior sigue visible debajo. La controla el
         router via appLoader.showProgress/hideProgress. -->
    <div class="route-progress" id="routeProgress" aria-hidden="true"></div>

    <!-- Loader global FULL-SCREEN: solo para boot inicial y operaciones largas
         explicitas (no para navegacion). Lo solicita appLoader.showSpinner. -->
    <div class="loader-overlay loader-overlay--hidden loader-overlay--gone" id="globalSpinner" aria-hidden="true">
        <div class="loader">
            <div class="loader-line"></div>
        </div>
    </div>

    <!-- Navigation Container (Persistente) -->
    <!-- El Navigation component se renderizará aquí -->
    <div id="navigation-container"></div>

    <!-- App Container (Dinámico) -->
    <!-- Las vistas se cargarán aquí dinámicamente.
         role="main" marca esto como el landmark principal para screen
         readers (las vistas no necesitan agregar otro <main> dentro).
         tabindex="-1" permite que el skip-link mueva el foco aquí sin
         que el contenedor sea tabbable en navegación normal. -->
    <div id="app-container" role="main" aria-label="Contenido principal" tabindex="-1"></div>

    <!-- Public Shell (persistente entre rutas públicas: header + main + footer fuera de app-container para evitar parpadeo) -->
    <div id="public-shell" aria-hidden="true">
      <div id="public-header-root"></div>
      <main id="public-view-content"></main>
      <div id="public-footer-root"></div>
    </div>

    <!-- Portal de modales: fuera del scroll, centrados en pantalla -->
    <div id="modals-portal" aria-hidden="true"></div>

    <!-- External Scripts.
         Chart.js no se carga aquí; otras vistas lo cargan bajo demanda si lo necesitan.
         Supabase JS SDK usa `defer` para no bloquear la primera pintura del hero.
         Versión pinneada + SRI: sin pin, jsdelivr resuelve `@2` a la última minor y el
         SRI rompería en cada release. Con hash fijo, si el CDN sirve bytes distintos el
         navegador rechaza el script (mitiga un compromiso de la supply-chain). -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.2" defer
            integrity="sha384-clqYxV1hjoC1RwoBT11M16mn2I42U4CCZc2QcnjigG/l1lFSxC/zBRAoMxhlrK1Z"
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- URL base del ai-engine (opcional). Ver js/runtime-config.js -->
    <script src="js/runtime-config.js?v=__BUILD_ID__" defer></script>

    <!-- i18n: catalogos + servicio (window.i18n / window.t). DEBE ir antes de
         BaseView y de cualquier vista, porque los templates usan ${t('...')}.
         Cada idioma extra = un <script> de catalogo mas + su codigo en SUPPORTED. -->
    <script src="js/i18n/en.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/I18n.js?v=__BUILD_ID__" defer></script>

    <!-- Core: app-loader (Supabase config + spinner global) — rutas relativas a <base href="/"> -->
    <script src="js/app-loader.js?v=__BUILD_ID__" defer></script>
    <!-- ErrorLogger temprano para capturar crashes del bootstrap (window.error + unhandledrejection).
         No depende de Supabase: si aún no está disponible, buffea en LS y flushea cuando llegue. -->
    <script src="js/services/ErrorLogger.js?v=__BUILD_ID__" defer></script>
    <!-- ErrorHandler: define window.errorHandler (toast + estado de error con retry).
         BaseView.render y router.js lo invocan tras un guard `if` que antes nunca pasaba. -->
    <script src="js/services/ErrorHandler.js?v=__BUILD_ID__" defer></script>
    <!-- PageMeta: título dinámico "{Org} | {Section}". Debe ir ANTES de router.js
         para registrar el listener `routechange` antes del primer dispatch. -->
    <script src="js/utils/PageMeta.js?v=__BUILD_ID__" defer></script>
    <script src="js/views/BaseView.js?v=__BUILD_ID__" defer></script>
    <script src="js/router.js?v=__BUILD_ID__" defer></script>

    <!-- Modal primitiva compartida (window.Modal.show) -->
    <script src="js/utils/modal.js?v=__BUILD_ID__" defer></script>

    <!-- Toast accesible (window.showToast) — aria-live polite/assertive -->
    <script src="js/utils/toast.js?v=__BUILD_ID__" defer></script>

    <!-- Web Vitals telemetry: LCP/CLS/FCP/TTFB → window.__webVitals
         + flush a errorLogger en producción al visibilitychange:hidden -->
    <script src="js/utils/webvitals.js?v=__BUILD_ID__" defer></script>

    <!-- UI primitives compartidas (window.UI.Button/Card/Input/Dialog/Dropdown/Tabs) -->
    <script src="js/ui/primitives.js?v=__BUILD_ID__" defer></script>

    <!-- Utilidades de color — fuente única para hexToHSL/hslToHex/hexToRgba/etc.
         Debe cargar ANTES que OrgBrandTheme (que las consume en el theme inicial). -->
    <script src="js/utils/brand-colors.js?v=__BUILD_ID__" defer></script>

    <!-- Modelo de roles + capabilities de organización. Debe cargar ANTES que
         AuthService (que expone hasPermission) y que Navigation (que filtra items). -->
    <script src="js/utils/capabilities.js?v=__BUILD_ID__" defer></script>

    <!-- Mapping kind→label/icon/cost para Credits page y el patrón
         "esta acción cuesta X cr" antes de generar. -->
    <script src="js/utils/credit-costs.js?v=__BUILD_ID__" defer></script>

    <!-- Justified rows layout (Flickr/Higgsfield-style). Lo usan Production y
         Products. window.applyJustifiedLayout(container, opts). -->
    <script src="js/utils/justified-layout.js?v=__BUILD_ID__" defer></script>

    <!-- Optimizador de media: sirve variantes livianas de media.aismartcontent.io
         (resize+WebP/AVIF al vuelo, posters de video) sin tocar URLs canonicas. -->
    <script src="js/utils/media-optimizer.js?v=__BUILD_ID__" defer></script>

    <!-- Services (AuthService imprescindible: si falla 404/redirect, el router redirige a onboarding) -->
    <script src="js/services/CampanasDataService.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/CompetenciaDataService.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/StrategiaDataService.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/TendenciasDataService.js?v=__BUILD_ID__" defer></script>
    <script src="js/components/DateRangePicker.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/SupabaseService.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/ApiClient.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/AuthService.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/OrgBrandTheme.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/DevRankTheme.js?v=__BUILD_ID__" defer></script>
    <script src="js/org-url.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/AppState.js?v=__BUILD_ID__" defer></script>
    <script src="js/services/BillingService.js?v=__BUILD_ID__" defer></script>
    <script src="js/session-utils.js?v=__BUILD_ID__" defer></script>

    <!-- SwitchUserController: impersonacion de developers por leads (banner + modal). -->
    <script src="js/components/SwitchUserController.js?v=__BUILD_ID__" defer></script>

    <!-- Shell público (header + footer persistentes) — se usa en páginas legales -->
    <script src="js/components/PublicLayout.js?v=__BUILD_ID__" defer></script>
    <script src="js/views/PublicBaseView.js?v=__BUILD_ID__" defer></script>

    <!-- Vista crítica: login (es ahora la página principal) -->
    <script src="js/views/SignInView.js?v=__BUILD_ID__" defer></script>

    <!-- ARDE sentinel: aviso ntfy+email cuando alguien llega al login (solo rutas públicas de entrada) -->
    <script src="js/arde-sentinel.js?v=__BUILD_ID__" defer></script>

    <!-- Demo mode (anonymous preview de IGNIS): guard + vista pública /demo -->
    <script src="js/services/DemoGuard.js?v=__BUILD_ID__" defer></script>
    <script src="js/views/DemoEntryView.js?v=__BUILD_ID__" defer></script>

    <!-- Lazy-loader del bundle de Navigation (~35 KB gz). Las rutas públicas
         (/, /login, /signin, legales) no renderizan sidebar, así que cargar
         Navigation y sus mixins ahí desperdicia bytes. El router invoca
         window.__ensureNavigationLoaded() tras pasar el auth check. -->
    <script src="js/utils/lazy-nav.js?v=__BUILD_ID__" defer></script>
    <script src="js/app.js?v=__BUILD_ID__" defer></script>

    <!-- Prefetch de top-5 vistas en idle time. Si el browser tiene cycles
         libres tras el LCP, descarga estos JS en background con baja
         prioridad. La primera navegación a Dashboard/Studio/Production/
         Brand Storage/Tasks se siente "instant" porque el script ya
         está cacheado. Cero coste si idle nunca llega (low-end devices). -->
    <script>
      (function() {
        var topViews = [
          'js/views/DashboardView.js',
          'js/views/StudioView.js',
          'js/views/ProductionView.js',
          'js/views/BrandstorageView.js',
          'js/views/TasksView.js'
        ];
        function injectPrefetch() {
          topViews.forEach(function(src) {
            var link = document.createElement('link');
            link.rel = 'prefetch';
            link.as = 'script';
            link.href = src;
            document.head.appendChild(link);
          });
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(injectPrefetch, { timeout: 4000 });
        } else {
          setTimeout(injectPrefetch, 2000);
        }
      })();
    </script>

</body>
</html>
