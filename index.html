<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Smart Content - Arde Agency</title>
    <meta name="description" content="Plataforma de generación de contenido con IA desarrollada por Arde Agency">
    <link rel="canonical" href="https://aismartcontent.io/">
    <!-- Favicons: predeterminado (tema claro) y versión para tema oscuro -->
    <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/favicons/favicon-dark.svg" media="(prefers-color-scheme: dark)">
    <meta property="og:url" content="https://aismartcontent.io/">
    <meta property="og:title" content="AI Smart Content - Arde Agency">
    <meta property="og:description" content="Plataforma de generación de contenido con IA desarrollada por Arde Agency">
    <meta property="og:type" content="website">
    
    <!-- Preconnect para optimización -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Application CSS — bundle unico (regenerar con: bash scripts/build-css.sh) -->
    <link rel="stylesheet" href="/css/bundle.css">
    
    <style>
        #modals-portal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            pointer-events: none;
        }
        #modals-portal > .modal {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <!-- Navigation Container (Persistente) -->
    <!-- El Navigation component se renderizará aquí -->
    <div id="navigation-container"></div>

    <!-- App Container (Dinámico) -->
    <!-- Las vistas se cargarán aquí dinámicamente -->
    <div id="app-container"></div>

    <!-- Portal de modales: fuera del scroll, centrados en pantalla -->
    <div id="modals-portal" aria-hidden="true"></div>

    <!-- External Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Core Scripts (rutas absolutas para que funcionen en /org/xxx/...) -->
    <script src="/js/app-loader.js"></script>
    <script src="/js/views/BaseView.js"></script>
    <script src="/js/router.js"></script>
    
    <!-- Services (cargar antes de las vistas) -->
    <script src="/js/services/SupabaseService.js"></script>
    <script src="/js/services/AuthService.js"></script>
    <script src="/js/services/AppState.js"></script>
    <script src="/js/utils/Performance.js"></script>
    <script src="/js/utils/ErrorHandler.js"></script>
    <script src="/js/session-utils.js"></script>
    
    <!-- Views (cargar antes de app.js para que estén disponibles) -->
    <script src="/js/views/LandingView.js"></script>
    <script src="/js/views/SignInView.js"></script>
    <script src="/js/views/CambiarContrasenaView.js"></script>
    <script src="/js/views/PlanesView.js"></script>
    <script src="/js/views/FormRecordView.js"></script>
    <script src="/js/views/HogarView.js"></script>
    <script src="/js/views/BrandsView.js"></script>
    <script src="/js/views/CampaignsView.js"></script>
    <script src="/js/views/AudiencesView.js"></script>
    <script src="/js/views/CreateView.js"></script>
    <script src="/js/views/ContentView.js"></script>
    <script src="/js/views/SettingsView.js"></script>
    <script src="/js/views/OrganizationView.js"></script>
    <script src="/js/views/LivingView.js"></script>
    <script src="/js/views/StudioView.js"></script>
    <script src="/js/views/FlowCatalogView.js"></script>
    <script src="/js/views/ProductsView.js"></script>
    
    <!-- Input Registry (render dinámico de inputs, schema-driven) -->
    <script src="/js/flags-data.js"></script>
    <script src="/js/input-registry.js"></script>
    <!-- Developer Portal Views (PaaS) -->
    <script src="/js/views/DevBaseView.js"></script>
    <script src="/js/views/DevDashboardView.js"></script>
    <script src="/js/views/DevFlowsView.js"></script>
    <script src="/js/views/DevLogsView.js"></script>
    <script src="/js/views/DevBuilderView.js"></script>
    <script src="/js/views/DevTestView.js"></script>
    <script src="/js/views/DevWebhooksView.js"></script>
    <!-- Lead-only views (dev_role === 'lead') -->
    <script src="/js/views/DevLeadTeamView.js"></script>
    <script src="/js/views/DevLeadCategoriesView.js"></script>
    <script src="/js/views/DevLeadInputSchemasView.js"></script>
    <script src="/js/views/DevLeadVectorsView.js"></script>
    <script src="/js/views/DevLeadReferencesView.js"></script>
    <script src="/js/views/DevLeadAllFlowsView.js"></script>
    
    <!-- Components -->
    <script src="/js/components/Navigation.js"></script>
    
    <!-- Managers (cargar después de las vistas) -->
    <script src="/js/products.js"></script>
    
    <script src="/js/app.js"></script>

</body>
</html>
