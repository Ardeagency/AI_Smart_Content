<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <base href="/">
    <title>AI Smart Content - Arde Agency</title>
    <meta name="description" content="Plataforma de generación de contenido con IA desarrollada por Arde Agency">
    <link rel="canonical" href="https://aismartcontent.io/">
    <!-- Favicons: predeterminado (tema claro) y versión para tema oscuro -->
    <link rel="icon" type="image/svg+xml" href="/recursos/favicons/favicon.svg">
    <link rel="icon" type="image/svg+xml" href="/recursos/favicons/favicon-dark.svg" media="(prefers-color-scheme: dark)">
    <meta property="og:url" content="https://aismartcontent.io/">
    <meta property="og:title" content="AI Smart Content - Arde Agency">
    <meta property="og:description" content="Plataforma de generación de contenido con IA desarrollada por Arde Agency">
    <meta property="og:type" content="website">
    
    <!-- Preconnect — solo orígenes críticos para primera pintura -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <!-- Preload: solo primera imagen del hero (las siguientes se cargan bajo demanda al rotar).
         Mismos parámetros de Cloudinary que LandingView para aprovechar el mismo cache-key. -->
    <link rel="preload" as="image" fetchpriority="high" href="https://res.cloudinary.com/dmruwjuxn/image/upload/q_auto,f_auto,c_limit,w_1920,dpr_auto/v1776102754/f6c61290-16d4-440d-9772-a74f13a80f35-cloud-wonder_2-2x_copia_bxpbfo.jpg">

    <!-- Application CSS — crítico, bloqueante.
         bundle.css usa @import para cargar módulos → los navegadores los descargan en
         cascada. Preload paralelo de los módulos usados en la landing para evitar
         esa cadena serial y acelerar la primera pintura. -->
    <link rel="preload" as="style" href="css/modules/public.css">
    <link rel="preload" as="style" href="css/modules/landing.css">
    <link rel="preload" as="style" href="css/modules/navigation.css">
    <link rel="preload" as="style" href="css/modules/auth.css">
    <link rel="stylesheet" href="css/bundle.css?v=20260415-identities-add-buttons">

    <!-- Fuente Inter — pesos reducidos (solo los usados en la UI) + display=swap -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>

    <!-- Icon fonts — carga NO bloqueante (pattern preload+onload swap). Solo se usan en vistas autenticadas -->
    <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"></noscript>
    <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css"></noscript>
    
    <style>
        #modals-portal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            pointer-events: none;
        }
        #modals-portal > .modal {
            pointer-events: auto;
        }
    </style>
</head>
<body class="entrance-active">
    <!-- Entrance: rectángulo con degradado (amarillo/verde) + logo -->
    <div class="entrance-overlay" id="entranceOverlay" aria-hidden="true">
        <div class="entrance-animation">
            <div class="entrance-text-block entrance-text-2">
                <div class="entrance-reveal-frame">
                    <span class="entrance-reveal-box" aria-hidden="true"></span>
                    <img src="/recursos/logos/logo-03.svg" alt="AI Smart Content" class="entrance-logo" width="320" height="64" fetchpriority="high" decoding="async">
                </div>
            </div>
        </div>
    </div>

    <!-- Loader global: solo visible si la landing no ha terminado de renderizar (show/hide vía appLoader) -->
    <div class="loader-overlay loader-overlay--hidden" id="globalSpinner" aria-hidden="true">
        <div class="loader">
            <div class="loader-line"></div>
        </div>
    </div>

    <!-- Fondo de la landing (misma imagen que login, fuera de #app-container) -->
    <div id="landing-background-wrap" class="landing-background" aria-hidden="true"></div>

    <!-- Navigation Container (Persistente) -->
    <!-- El Navigation component se renderizará aquí -->
    <div id="navigation-container"></div>

    <!-- App Container (Dinámico) -->
    <!-- Las vistas se cargarán aquí dinámicamente -->
    <div id="app-container"></div>

    <!-- Public Shell (persistente entre rutas públicas: header + main + footer fuera de app-container para evitar parpadeo) -->
    <div id="public-shell" aria-hidden="true">
      <div id="public-header-root"></div>
      <main id="public-view-content"></main>
      <div id="public-footer-root"></div>
    </div>

    <!-- Portal de modales: fuera del scroll, centrados en pantalla -->
    <div id="modals-portal" aria-hidden="true"></div>

    <!-- External Scripts.
         Chart.js ya no se carga aquí: se lazy-loadea desde DashboardView cuando se necesita.
         Supabase JS SDK usa `defer` para no bloquear la primera pintura del hero. -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

    <!-- URL base del ai-engine (opcional). Ver js/runtime-config.js -->
    <script src="js/runtime-config.js" defer></script>

    <!-- Core: loader + entrada animada (rutas relativas a <base href="/">) -->
    <script src="js/app-loader.js" defer></script>
    <script src="js/views/BaseView.js" defer></script>
    <script src="js/router.js" defer></script>

    <!-- Services (AuthService imprescindible: si falla 404/redirect, el router redirige a onboarding) -->
    <script src="js/services/SupabaseService.js" defer></script>
    <script src="js/services/AuthService.js" defer></script>
    <script src="js/services/OrgBrandTheme.js?v=20260409-11" defer></script>
    <script src="js/org-url.js" defer></script>
    <script src="js/services/AppState.js" defer></script>
    <script src="js/session-utils.js" defer></script>

    <!-- Shell público (header + footer persistentes) — se usa en landing y demás públicas -->
    <script src="js/components/PublicLayout.js?v=20260414-public-shell" defer></script>
    <script src="js/views/PublicBaseView.js?v=20260414-public-shell" defer></script>

    <!-- Vistas críticas (landing + login) — el resto se carga lazy por ruta -->
    <script src="js/views/LandingView.js?v=20260414-inline" defer></script>
    <script src="js/views/SignInView.js?v=20260414-inline" defer></script>

    <!-- Navigation + App init -->
    <script src="js/components/Navigation.js?v=20260415-identities-workspace" defer></script>
    <script src="js/app.js?v=20260409-11" defer></script>

</body>
</html>
