<!-- Vista de Lista de Campañas -->
<div class="campaigns-container" id="campaignsListContainer">
    <div class="campaigns-header">
        <h1 class="campaigns-title">Campañas</h1>
        <button class="btn btn-primary" id="createCampaignBtn">
            <i class="fas fa-plus"></i>
            Nueva Campaña
        </button>
    </div>

    <div class="campaigns-grid" id="campaignsGrid"></div>
</div>

<!-- Vista de Detalle de Campaña -->
<div class="campaign-detail-container" id="campaignDetailContainer" style="display: none;">
    <div class="campaign-detail-header">
        <button class="btn btn-secondary" id="backToCampaignsBtn">
            <i class="fas fa-arrow-left"></i>
            Volver
        </button>
        <h1 class="campaign-detail-title" id="campaignDetailTitle">Campaña</h1>
    </div>

    <div class="campaign-detail-tabs">
        <button class="tab-btn active" data-tab="brief">Brief</button>
        <button class="tab-btn" data-tab="audiences">Audiencias</button>
        <button class="tab-btn" data-tab="channels">Canales</button>
        <button class="tab-btn" data-tab="content">Contenido</button>
        <button class="tab-btn" data-tab="performance">Performance</button>
    </div>

    <div class="campaign-detail-content">
        <div class="tab-content active" id="briefTab">
            <h2>Brief</h2>
            <p>Objetivo, KPI, mensaje central</p>
        </div>
        <div class="tab-content" id="audiencesTab">
            <h2>Audiencias Objetivo</h2>
            <p>Segmentos asociados</p>
        </div>
        <div class="tab-content" id="channelsTab">
            <h2>Canales</h2>
            <p>Social, Ads, Web, Email</p>
        </div>
        <div class="tab-content" id="contentTab">
            <h2>Contenido</h2>
            <p>Piezas generadas, variantes, estado</p>
        </div>
        <div class="tab-content" id="performanceTab">
            <h2>Performance</h2>
            <p>Qué funcionó, qué no (futuro)</p>
        </div>
    </div>
</div>
