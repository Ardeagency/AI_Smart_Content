<!-- Contenedor principal -->
<div class="auth-container">
    <!-- Formulario de autenticación -->
    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <span>AI SMART CONTENT</span>
        </div>

        <!-- Formulario de Login -->
        <form class="auth-form active" id="loginForm" data-form="login">
            <h2>Login</h2>

            <div class="form-group">
                <label for="loginEmail">Email</label>
                <div class="input-container">
                    <input type="email" id="loginEmail" placeholder="username@gmail.com" required>
                </div>
            </div>
                
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-container">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="button" class="toggle-password" data-target="loginPassword">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="auth-button">
                <span class="button-text">Sign in</span>
                <div class="loading-spinner" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
            </button>
        </form>

        <!-- Divider -->
        <div class="divider">
            <span>or continue with</span>
        </div>

        <!-- Social Login -->
        <div class="social-login">
            <button class="social-button google" id="googleLoginBtn">
                <i class="fab fa-google"></i>
                <span>Google</span>
            </button>
        </div>

        <!-- Register Link -->
        <div class="register-link">
            <p>Don't have an account yet? <a href="/planes">Register for free</a></p>
        </div>
    </div>
</div>

<!-- Notificaciones -->
<div class="notification" id="notification">
    <div class="notification-content">
        <i class="notification-icon"></i>
        <span class="notification-message"></span>
    </div>
    <button class="notification-close">
        <i class="fas fa-times"></i>
    </button>
</div>
