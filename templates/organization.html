<!-- Header Principal -->
<header class="main-header">
    <div class="header-content">
        <button class="header-sidebar-toggle" id="headerSidebarToggle" aria-label="Toggle sidebar">
            <i class="fas fa-bars"></i>
        </button>
        <div class="header-left">
            <div class="logo-section">
                <div class="title-section">
                    <h1 id="headerRoute">Organización</h1>
                </div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-credits" id="headerCredits">
                <span class="header-credits-value" id="headerCreditsValue">0/0</span>
            </div>
            <div class="header-avatar" id="headerAvatar">
                <div class="avatar-circle" id="avatarCircle">
                    <span class="avatar-initials" id="avatarInitials">M</span>
                </div>
            </div>
            <button class="hamburger-menu" id="hamburgerMenu">
                <div class="hamburger-line"></div>
                <div class="hamburger-line"></div>
                <div class="hamburger-line"></div>
            </button>
        </div>
    </div>
</header>

<div class="organization-container">
    <div class="organization-header">
        <h1 class="organization-title">Organización</h1>
    </div>

    <!-- Tabs Navigation -->
    <div class="organization-tabs">
        <button class="tab-btn active" data-tab="overview">Overview</button>
        <button class="tab-btn" data-tab="users">Usuarios & Roles</button>
        <button class="tab-btn" data-tab="permissions">Permisos</button>
        <button class="tab-btn" data-tab="integrations">Integraciones</button>
        <button class="tab-btn" data-tab="billing">Facturación</button>
    </div>

    <!-- Tab Content -->
    <div class="organization-content">
        <!-- Overview Tab -->
        <div class="tab-content active" id="overviewTab">
            <div class="organization-overview">
                <h2>Información General</h2>
                <p>Vista general de la organización</p>
            </div>
        </div>

        <!-- Users Tab -->
        <div class="tab-content" id="usersTab">
            <div class="organization-users">
                <h2>Usuarios & Roles</h2>
                <p>Gestión de usuarios y roles</p>
            </div>
        </div>

        <!-- Permissions Tab -->
        <div class="tab-content" id="permissionsTab">
            <div class="organization-permissions">
                <h2>Permisos</h2>
                <p>Configuración de permisos</p>
            </div>
        </div>

        <!-- Integrations Tab -->
        <div class="tab-content" id="integrationsTab">
            <div class="organization-integrations">
                <h2>Integraciones</h2>
                <p>Gestión de integraciones</p>
            </div>
        </div>

        <!-- Billing Tab -->
        <div class="tab-content" id="billingTab">
            <div class="organization-billing">
                <h2>Facturación / Plan</h2>
                <p>Información de facturación y plan</p>
            </div>
        </div>
    </div>
</div>
