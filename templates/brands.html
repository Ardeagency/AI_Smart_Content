<!-- Brands Dashboard - Diseño Premium -->
<div class="brand-dashboard-container" id="brandsListContainer">
    
    <!-- Fondo -->
    <div class="brand-dashboard-background">
        <div class="background-gradient"></div>
    </div>
    
    <!-- Footer: MARCA + URLs + Mercado -->
    <div class="brand-corner-bottom-left">
        <!-- MARCA grande + lista de URLs al lado -->
        <div class="brand-main-info">
            <div class="brand-name-row">
                <h1 class="brand-name-large" id="brandNameLarge">BRAND</h1>
                <div class="brand-status-indicator"><span class="status-dot"></span></div>
            </div>
            <div class="brand-links-row">
                <a href="#" class="brand-link" id="linkWebsite" target="_blank"><i class="fas fa-globe"></i></a>
                <a href="#" class="brand-link" id="linkInstagram" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="#" class="brand-link" id="linkTikTok" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="#" class="brand-link" id="linkFacebook" target="_blank"><i class="fab fa-facebook"></i></a>
            </div>
        </div>
        <!-- Mercado objetivo debajo -->
        <div class="brand-market-row">
            <span class="market-label" id="brandMarketLabel"></span>
        </div>
    </div>
    
    <!-- Cards a la derecha -->
    <div class="brand-cards-zone">
        
        <!-- INFO - Solo botón expandir -->
        <div class="brand-card card-info">
            <div class="card-header">
                <h2 class="card-title">INFO</h2>
                <span class="card-arrow"><i class="fas fa-arrow-right"></i></span>
            </div>
        </div>
        
        <!-- Visual de marca -->
        <div class="brand-card card-concept">
            <div class="card-header">
                <h2 class="card-title">Visual de marca</h2>
            </div>
            <div class="card-content">
                <!-- Brand Colors -->
                <div class="visual-section">
                    <div class="visual-section-label">Brand Colors</div>
                    <div class="color-swatches" id="brandColorSwatches">
                        <!-- Se renderizarán dinámicamente -->
                    </div>
                </div>
                
                <!-- Typography System -->
                <div class="visual-section">
                    <div class="visual-section-label">Typography System</div>
                    <div class="typography-preview" id="typographyPreview">
                        <!-- Se renderizará dinámicamente -->
                    </div>
                </div>
                
                <!-- Separador -->
                <div class="visual-separator"></div>
                
                <!-- System Status -->
                <div class="visual-status" id="visualStatus">
                    <!-- Se renderizará dinámicamente -->
                </div>
            </div>
        </div>
        
        <!-- SCREENING ROOM -->
        <div class="brand-card card-screening">
            <div class="card-header">
                <h2 class="card-title">SCREENING ROOM</h2>
                <div class="card-icon-circle">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="6" cy="6" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="18" cy="6" r="1.5"/>
                        <circle cx="6" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/>
                        <circle cx="6" cy="18" r="1.5"/><circle cx="12" cy="18" r="1.5"/><circle cx="18" cy="18" r="1.5"/>
                    </svg>
                </div>
            </div>
            <a href="/library" class="card-arrow-sub"><i class="fas fa-arrow-right"></i></a>
            <div class="card-content">
                <div class="card-spacer"></div>
                <div class="card-current">
                    <span class="current-label">Current</span>
                    <span class="current-value" id="screeningCurrentValue">CONTENT PRODUCTION</span>
                </div>
                <div class="card-progress">
                    <span class="progress-time" id="progressTime">0 / 100</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <div class="card-footer">
                    <span class="footer-text" id="screeningFooterText">Available tokens</span>
                </div>
            </div>
        </div>
        
        <!-- EVENTS -->
        <div class="brand-card card-events">
            <div class="card-header">
                <h2 class="card-title">EVENTS</h2>
                <div class="card-icon-circle">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="6" cy="6" r="1.5"/><circle cx="12" cy="6" r="1.5"/><circle cx="18" cy="6" r="1.5"/>
                        <circle cx="6" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/>
                        <circle cx="6" cy="18" r="1.5"/><circle cx="12" cy="18" r="1.5"/><circle cx="18" cy="18" r="1.5"/>
                    </svg>
                </div>
            </div>
            <a href="/products" class="card-arrow-sub"><i class="fas fa-arrow-right"></i></a>
            <div class="card-content">
                <div class="event-item">
                    <div class="event-info">
                        <span class="event-name" id="eventName1">Product</span>
                        <span class="event-desc" id="eventDesc1">Featured</span>
                    </div>
                    <div class="event-date">
                        <span class="event-date-value" id="eventDate1">-</span>
                        <span class="event-time-value" id="eventTime1">-</span>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
    
</div>
