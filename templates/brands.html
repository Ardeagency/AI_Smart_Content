<!-- Vista de Marca - Diseño Dashboard Minimalista -->
<div class="brand-dashboard-container" id="brandsListContainer">
    
    <!-- FONDO AMARILLO ELÉCTRICO (estado activo) -->
    <div class="brand-dashboard-background"></div>
    
    <!-- ESQUINA SUPERIOR IZQUIERDA: Equipo de la organización -->
    <div class="brand-corner-top-left">
        <div class="team-avatars" id="teamAvatars">
            <div class="team-avatar-placeholder">
                <i class="fas fa-users"></i>
            </div>
        </div>
    </div>
    
    <!-- ESQUINA INFERIOR IZQUIERDA: Identidad básica de la marca (editable) -->
    <div class="brand-corner-bottom-left">
        <div class="brand-identity-editable">
            <div class="identity-field">
                <input type="text" class="identity-input" id="brandNameInput" placeholder="Nombre de marca" data-field="nombre_marca">
            </div>
            <div class="identity-field">
                <input type="url" class="identity-input" id="brandWebsiteInput" placeholder="Website" data-field="sitio_web">
                <i class="fas fa-globe"></i>
            </div>
            <div class="identity-social">
                <input type="url" class="identity-input-small" id="brandInstagramInput" placeholder="Instagram" data-field="instagram_url">
                <i class="fab fa-instagram"></i>
            </div>
            <div class="identity-social">
                <input type="url" class="identity-input-small" id="brandTikTokInput" placeholder="TikTok" data-field="tiktok_url">
                <i class="fab fa-tiktok"></i>
            </div>
            <div class="identity-social">
                <input type="url" class="identity-input-small" id="brandFacebookInput" placeholder="Facebook" data-field="facebook_url">
                <i class="fab fa-facebook"></i>
            </div>
            <div class="identity-field">
                <input type="text" class="identity-input" id="brandMarketInput" placeholder="Mercado objetivo" data-field="mercado_objetivo">
            </div>
        </div>
    </div>
    
    <!-- ZONA DERECHA: Cards de Control -->
    <div class="brand-cards-zone">
        
        <!-- CARD 1 — INFO: Lineamientos de Marca -->
        <div class="brand-card card-info">
            <div class="card-header">
                <h2 class="card-title">INFO</h2>
                <a href="#" class="card-arrow" id="infoCardLink">
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            <div class="card-content">
                <div class="card-status" id="infoCardStatus">
                    <span class="status-label">Estado:</span>
                    <span class="status-value" id="infoStatusValue">Cargando...</span>
                </div>
                <div class="card-update" id="infoCardUpdate">
                    <span class="update-label">Última actualización:</span>
                    <span class="update-value" id="infoUpdateValue">-</span>
                </div>
                <div class="card-summary">
                    <div class="summary-item">
                        <span class="summary-label">Tono de voz</span>
                        <span class="summary-value" id="infoTonoVoz">-</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Palabras clave</span>
                        <span class="summary-value" id="infoPalabras">-</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Reglas activas</span>
                        <span class="summary-value" id="infoReglas">0</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- CARD 2 — BRANDS: Identidad visual -->
        <div class="brand-card card-visual">
            <div class="card-header">
                <h2 class="card-title">BRANDS</h2>
                <a href="#" class="card-arrow" id="visualCardLink">
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            <div class="card-content">
                <div class="visual-colors" id="visualColors">
                    <div class="color-preview-empty">
                        <i class="fas fa-palette"></i>
                        <span>Sin colores definidos</span>
                    </div>
                </div>
                <div class="visual-typography" id="visualTypography">
                    <span class="typography-label">Tipografía:</span>
                    <span class="typography-value" id="typographyValue">-</span>
                </div>
            </div>
        </div>
        
        <!-- CARD 3 — TOKENS: Uso del sistema -->
        <div class="brand-card card-tokens">
            <div class="card-header">
                <h2 class="card-title">TOKENS</h2>
                <a href="#" class="card-arrow" id="tokensCardLink">
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            <div class="card-content">
                <div class="tokens-available" id="tokensAvailable">
                    <span class="tokens-label">Disponibles:</span>
                    <span class="tokens-value" id="tokensValue">-</span>
                </div>
                <div class="tokens-usage">
                    <div class="usage-bar">
                        <div class="usage-bar-fill" id="usageBarFill"></div>
                    </div>
                    <div class="usage-text" id="usageText">0% usado</div>
                </div>
                <div class="tokens-recent" id="tokensRecent">
                    <div class="recent-label">Últimas producciones:</div>
                    <div class="recent-list" id="recentList">
                        <div class="recent-empty">Sin producciones recientes</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- CARD 4 — PRODUCTOS: Activos comerciales -->
        <div class="brand-card card-products">
            <div class="card-header">
                <h2 class="card-title">PRODUCTOS</h2>
                <a href="#" class="card-arrow" id="productsCardLink">
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            <div class="card-content">
                <div class="products-grid" id="productsGrid">
                    <div class="products-empty">
                        <i class="fas fa-box-open"></i>
                        <span>Sin productos</span>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
    
</div>
