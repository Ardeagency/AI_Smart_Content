<!-- Brands Dashboard - Diseño Premium -->
<div class="brand-dashboard-container" id="brandsListContainer">
    
    <!-- Fondo -->
    <div class="brand-dashboard-background">
        <div class="background-gradient"></div>
    </div>
    
    <!-- Footer: MARCA + URLs + Mercado -->
    <div class="brand-corner-bottom-left">
        <!-- MARCA grande + lista de URLs al lado -->
        <div class="brand-main-info">
            <div class="brand-name-row">
                <h1 class="brand-name-large" id="brandNameLarge">BRAND</h1>
                <div class="brand-status-indicator"><span class="status-dot"></span></div>
            </div>
            <div class="brand-links-row">
                <a href="#" class="brand-link" id="linkWebsite" target="_blank"><i class="fas fa-globe"></i></a>
                <a href="#" class="brand-link" id="linkInstagram" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="#" class="brand-link" id="linkTikTok" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="#" class="brand-link" id="linkFacebook" target="_blank"><i class="fab fa-facebook"></i></a>
            </div>
        </div>
        <!-- Mercado objetivo debajo -->
        <div class="brand-market-row">
            <span class="market-label" id="brandMarketLabel"></span>
        </div>
    </div>
    
    <!-- Cards a la derecha -->
    <div class="brand-cards-zone">
        
        <!-- INFO - Solo botón expandir -->
        <div class="brand-card card-info">
            <div class="card-header">
                <h2 class="card-title">INFO</h2>
                <span class="card-arrow"><i class="fas fa-arrow-right"></i></span>
            </div>
        </div>
        
        <!-- Visual de marca -->
        <div class="brand-card card-concept">
            <div class="card-header">
                <h2 class="card-title">Visual de marca</h2>
            </div>
            <div class="card-content">
                <!-- Brand Colors -->
                <div class="visual-section">
                    <div class="visual-section-label">Brand Colors</div>
                    <div class="color-swatches" id="brandColorSwatches">
                        <!-- Se renderizarán dinámicamente -->
                    </div>
                </div>
                
                <!-- Typography System -->
                <div class="visual-section">
                    <div class="visual-section-label">Typography System</div>
                    <div class="typography-preview" id="typographyPreview">
                        <!-- Se renderizará dinámicamente -->
                    </div>
                </div>
                
                <!-- Separador -->
                <div class="visual-separator"></div>
                
                <!-- System Status -->
                <div class="visual-status" id="visualStatus">
                    <!-- Se renderizará dinámicamente -->
                </div>
            </div>
        </div>
        
        <!-- Production Usage -->
        <div class="brand-card card-production">
            <div class="card-header">
                <h2 class="card-title">Production Usage</h2>
            </div>
            <div class="card-content">
                <!-- Estado actual -->
                <div class="production-section">
                    <div class="production-current">
                        <span class="production-label">CURRENT</span>
                        <span class="production-value" id="productionCurrentValue">Content Production</span>
                    </div>
                </div>
                
                <!-- Consumo de tokens -->
                <div class="production-section">
                    <div class="production-tokens">
                        <div class="tokens-bar">
                            <div class="tokens-bar-fill" id="tokensBarFill"></div>
                        </div>
                        <div class="tokens-text" id="tokensText">0 / 0 tokens</div>
                    </div>
                </div>
                
                <!-- Ritmo -->
                <div class="production-section">
                    <div class="production-rhythm">
                        <span class="rhythm-text" id="rhythmToday">0 outputs today</span>
                        <span class="rhythm-text" id="rhythmWeek">0 this week</span>
                    </div>
                </div>
                
                <!-- CTA silencioso -->
                <div class="production-cta">
                    <a href="/content" class="production-cta-link">View activity →</a>
                </div>
            </div>
        </div>
        
        <!-- Featured Products -->
        <div class="brand-card card-featured">
            <div class="card-header">
                <h2 class="card-title">Featured Products</h2>
            </div>
            <div class="card-content">
                <!-- Producto principal -->
                <div class="featured-product" id="featuredProductContainer">
                    <div class="featured-product-name" id="featuredProductName">No products</div>
                    <div class="featured-product-category" id="featuredProductCategory"></div>
                    <div class="featured-product-activity" id="featuredProductActivity">Add your first product</div>
                </div>
                
                <!-- CTA -->
                <div class="featured-cta">
                    <a href="/products" class="featured-cta-link">View product →</a>
                </div>
            </div>
        </div>
        
    </div>
    
</div>
