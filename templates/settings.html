<main class="settings-container" id="settingsPage" aria-label="Configuración de mi cuenta">
    <div class="settings-content">
        <section class="settings-section" aria-labelledby="profileHeading">
            <h2 id="profileHeading">Datos del perfil</h2>
            <p class="settings-section-desc">Nombre, email y datos de contacto. El email es el de tu cuenta y no se puede editar aquí.</p>
            <form id="settingsProfileForm" class="settings-form">
                <div class="form-group">
                    <label for="profileFullName">Nombre completo</label>
                    <input type="text" id="profileFullName" name="full_name" class="form-input" placeholder="Tu nombre" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="profileEmail">Email</label>
                    <input type="email" id="profileEmail" class="form-input" readonly placeholder="tu@email.com" aria-readonly="true">
                </div>
                <div class="form-group">
                    <label for="profilePhone">Teléfono</label>
                    <input type="tel" id="profilePhone" name="phone_number" class="form-input" placeholder="Opcional" autocomplete="tel">
                </div>
                <div class="form-group">
                    <label for="profileAvatarUrl">Foto de perfil (URL)</label>
                    <input type="url" id="profileAvatarUrl" name="avatar_url" class="form-input" placeholder="https://..." autocomplete="url">
                </div>
                <div class="form-group">
                    <label for="profileBio">Bio</label>
                    <textarea id="profileBio" name="bio" class="form-input form-textarea" placeholder="Breve descripción (opcional)" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="profileSubmitBtn">
                    <i class="fas fa-save"></i> Guardar cambios
                </button>
            </form>
        </section>
    </div>
</main>
