    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <button class="header-sidebar-toggle" id="headerSidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-left">
                <div class="logo-section">
                    <div class="title-section">
                        <h1 id="headerRoute">Living</h1>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="header-credits" id="headerCredits">
                    <span class="header-credits-value" id="headerCreditsValue">0/0</span>
                </div>
                <div class="header-avatar" id="headerAvatar">
                    <div class="avatar-circle" id="avatarCircle">
                        <span class="avatar-initials" id="avatarInitials">M</span>
                    </div>
                </div>
                <button class="hamburger-menu" id="hamburgerMenu">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content">
        <div class="living-container">
            <!-- 1. HERO - Visuales del Día (Emoción + Identidad) -->
            <div class="living-hero-section">
                <div class="living-hero-background">
                    <div class="living-hero-gradient"></div>
                </div>
                <div class="living-hero-visuals" id="productionsOfDay">
                    <div class="visual-day-item">
                        <div class="visual-day-placeholder">
                            <i class="fas fa-image"></i>
                        </div>
                    </div>
                    <div class="visual-day-item">
                        <div class="visual-day-placeholder">
                            <i class="fas fa-image"></i>
                        </div>
                    </div>
                    <div class="visual-day-item">
                        <div class="visual-day-placeholder">
                            <i class="fas fa-image"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. Últimas Producciones (Actividad Real) - Scroll Horizontal -->
            <div class="living-latest-section">
                <div class="living-latest-header">
                    <h2 class="living-section-title">Últimas Producciones</h2>
                </div>
                <div class="living-latest-scroll" id="productionsList">
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>No hay producciones recientes</p>
                    </div>
                </div>
            </div>

            <!-- 3. Insights Rápidos (Sin Romper el Mood) -->
            <div class="living-insights-section">
                <div class="living-insight-card">
                    <div class="insight-icon">
                        <i class="fas fa-star"></i>
                    </div>
                    <div class="insight-content">
                        <div class="insight-label">Producto Favorito</div>
                        <div class="insight-value" id="favoriteProductName">-</div>
                    </div>
                </div>
                <div class="living-insight-card">
                    <div class="insight-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="insight-content">
                        <div class="insight-label">Más Producido</div>
                        <div class="insight-value" id="topProductName">-</div>
                    </div>
                </div>
                <div class="living-insight-card">
                    <div class="insight-icon">
                        <i class="fas fa-film"></i>
                    </div>
                    <div class="insight-content">
                        <div class="insight-label">Formato Más Usado</div>
                        <div class="insight-value" id="topFormatName">-</div>
                    </div>
                </div>
                <div class="living-insight-card">
                    <div class="insight-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <div class="insight-content">
                        <div class="insight-label">Tokens Hoy</div>
                        <div class="insight-value" id="tokensToday">0</div>
                    </div>
                </div>
            </div>

            <!-- 4. Producción por Entidad (Contexto de Negocio) -->
            <div class="living-entity-section">
                <div class="living-entity-card">
                    <div class="entity-header">
                        <h3 class="entity-title">Producción por Entidad</h3>
                    </div>
                    <div class="entity-content" id="entityProduction">
                        <div class="empty-state-small">
                            <i class="fas fa-box"></i>
                            <p>No hay datos disponibles</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5. Uso de Recursos (Control Silencioso) - Lateral Inferior -->
            <div class="living-resources-section">
                <div class="living-resources-card">
                    <div class="resources-header">
                        <span class="resources-label">Recursos</span>
                    </div>
                    <div class="resources-content" id="tokensResources">
                        <div class="resource-item">
                            <span class="resource-label">Disponibles</span>
                            <span class="resource-value" id="tokensAvailableResource">0</span>
                        </div>
                        <div class="resource-item">
                            <span class="resource-label">Usados Hoy</span>
                            <span class="resource-value" id="tokensUsedTodayResource">0</span>
                        </div>
                        <div class="resource-progress">
                            <div class="resource-progress-bar">
                                <div class="resource-progress-fill" id="tokensProgressResource"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
