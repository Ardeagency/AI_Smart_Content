    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <button class="header-sidebar-toggle" id="headerSidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-left">
                <div class="logo-section">
                    <div class="title-section">
                        <h1 id="headerRoute">Living</h1>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="header-credits" id="headerCredits">
                    <span class="header-credits-value" id="headerCreditsValue">0/0</span>
                </div>
                <div class="header-avatar" id="headerAvatar">
                    <div class="avatar-circle" id="avatarCircle">
                        <span class="avatar-initials" id="avatarInitials">M</span>
                    </div>
                </div>
                <button class="hamburger-menu" id="hamburgerMenu">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content living-main-content">
        <div class="living-container">
            <!-- Sección 1: Hero/Encabezado - Producciones Automatizadas -->
            <!-- Jerarquía: Protagonista absoluto, mesa de edición, daily output -->
            <section class="living-hero-section">
                <div class="living-hero-container">
                    <h2 class="living-hero-title">Última tanda generada</h2>
                    <div class="living-hero-grid" id="livingHeroGrid">
                        <!-- Cards de producciones automatizadas (scroll horizontal) -->
                    </div>
                </div>
            </section>

            <!-- Sección 2 y 3: Grid de 2 columnas -->
            <section class="living-content-grid">
                <!-- Sección 2: Historial de Producciones (Izquierda) -->
                <!-- Jerarquía: Archivo editorial, línea de tiempo del trabajo -->
                <div class="living-history-section">
                    <!-- Sub-sección 2A: Videos -->
                    <div class="living-history-videos">
                        <div class="living-history-videos-container" id="livingHistoryVideos">
                            <!-- Bandeja de ediciones - scroll horizontal -->
                        </div>
                    </div>
                    
                    <!-- Sub-sección 2B: Imágenes -->
                    <div class="living-history-images">
                        <div class="living-masonry-grid" id="livingHistoryImages">
                            <!-- Archivo editorial - masonry funcional -->
                    </div>
                </div>
            </div>

                <!-- Sección 3: Destacados / Control (Derecha) -->
                <!-- Jerarquía: Soporte estratégico, mesa del productor -->
                <div class="living-highlights-section">
                    <div class="living-section-header">
                        <h2 class="living-section-title">Control de producción</h2>
                    </div>
                    <div class="living-highlights-content" id="livingHighlightsContent">
                        <!-- Mesa del productor: qué se usa, qué funciona, qué se ejecutó -->
                    </div>
                </div>
            </section>
                    </div>
    </main>

    <!-- Modal de Visualización - Editorial Card -->
    <div class="living-viewer-modal" id="livingViewerModal">
        <div class="living-viewer-backdrop" id="livingViewerBackdrop"></div>
        <div class="living-viewer-container">
            <button class="living-viewer-close" id="livingViewerClose">
                <i class="fas fa-times"></i>
            </button>
            <div class="living-viewer-content">
                <div class="living-viewer-visual">
                    <img id="livingViewerImage" src="" alt="" />
                </div>
                <div class="living-viewer-editorial">
                    <div class="living-viewer-prompt">
                        <label class="living-viewer-label">Prompt</label>
                        <div class="living-viewer-prompt-text" id="livingViewerPrompt"></div>
                    </div>
                    <div class="living-viewer-metadata">
                        <label class="living-viewer-label">Metadata</label>
                        <div class="living-viewer-metadata-content" id="livingViewerMetadata"></div>
                    </div>
                    <div class="living-viewer-actions">
                        <button class="living-viewer-download" id="livingViewerDownload" title="Descargar producción">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
