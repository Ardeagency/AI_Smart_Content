    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <button class="header-sidebar-toggle" id="headerSidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-left">
                <div class="logo-section">
                    <div class="title-section">
                        <h1 id="headerRoute">Living</h1>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="header-credits" id="headerCredits">
                    <span class="header-credits-value" id="headerCreditsValue">0/0</span>
                </div>
                <div class="header-avatar" id="headerAvatar">
                    <div class="avatar-circle" id="avatarCircle">
                        <span class="avatar-initials" id="avatarInitials">M</span>
                    </div>
                </div>
                <button class="hamburger-menu" id="hamburgerMenu">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content">
        <div class="living-container">
            <!-- HERO - Header Grande con Degradado -->
            <div class="living-hero-header">
                <div class="living-hero-background">
                    <div class="living-hero-gradient"></div>
                </div>
                <div class="living-hero-content">
                    <!-- Columna Izquierda: Producciones del Día -->
                    <div class="living-hero-left">
                        <h2 class="living-hero-title">Producciones del Día</h2>
                        <div class="living-productions-day" id="productionsOfDay">
                            <div class="production-day-item">
                                <div class="production-day-placeholder">
                                    <i class="fas fa-image"></i>
                                </div>
                            </div>
                            <div class="production-day-item">
                                <div class="production-day-placeholder">
                                    <i class="fas fa-image"></i>
                                </div>
                            </div>
                            <div class="production-day-item">
                                <div class="production-day-placeholder">
                                    <i class="fas fa-image"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Columna Derecha: Tokens -->
                    <div class="living-hero-right">
                        <h2 class="living-hero-title">Uso de Tokens</h2>
                        <div class="living-tokens-hero" id="tokensHero">
                            <div class="tokens-hero-stats">
                                <div class="token-hero-stat">
                                    <span class="token-hero-label">Usados</span>
                                    <span class="token-hero-value" id="tokensUsedHero">0</span>
                                </div>
                                <div class="token-hero-stat">
                                    <span class="token-hero-label">Disponibles</span>
                                    <span class="token-hero-value" id="tokensAvailableHero">0</span>
                                </div>
                                <div class="token-hero-stat">
                                    <span class="token-hero-label">Total</span>
                                    <span class="token-hero-value" id="tokensTotalHero">0</span>
                                </div>
                            </div>
                            <div class="tokens-hero-progress">
                                <div class="tokens-hero-progress-bar">
                                    <div class="tokens-hero-progress-fill" id="tokensProgressFillHero"></div>
                                </div>
                                <div class="tokens-hero-percentage" id="tokensPercentageHero">0% usado</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. Últimas Producciones (actividad real) -->
            <section class="living-latest-productions">
                <div class="living-section-header">
                    <h2 class="living-section-title">Últimas Producciones</h2>
                </div>
                <div class="living-productions-scroll" id="productionsList">
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>No hay producciones recientes</p>
                    </div>
                </div>
            </section>

            <!-- 3. Bloque Híbrido: Insights Rápidos -->
            <section class="living-insights">
                <div class="living-insights-grid">
                    <!-- Producto Más Producido -->
                    <div class="living-insight-card">
                        <div class="insight-icon">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="insight-content">
                            <div class="insight-label">Más Producido</div>
                            <div class="insight-value" id="topProductionProduct">-</div>
                        </div>
                    </div>

                    <!-- Producto Favorito -->
                    <div class="living-insight-card">
                        <div class="insight-icon">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="insight-content">
                            <div class="insight-label">Favorito</div>
                            <div class="insight-value" id="favoriteProduct">-</div>
                        </div>
                    </div>

                    <!-- Formato Más Usado -->
                    <div class="living-insight-card">
                        <div class="insight-icon">
                            <i class="fas fa-film"></i>
                        </div>
                        <div class="insight-content">
                            <div class="insight-label">Formato</div>
                            <div class="insight-value" id="topFormat">-</div>
                        </div>
                    </div>

                    <!-- Tokens Hoy -->
                    <div class="living-insight-card">
                        <div class="insight-icon">
                            <i class="fas fa-coins"></i>
                        </div>
                        <div class="insight-content">
                            <div class="insight-label">Tokens Hoy</div>
                            <div class="insight-value" id="tokensToday">0</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 4. Producción por Entidad (contexto de negocio) -->
            <section class="living-entities">
                <div class="living-section-header">
                    <h2 class="living-section-title">Por Entidad</h2>
                </div>
                <div class="living-entities-grid" id="entitiesProduction">
                    <div class="empty-state">
                        <i class="fas fa-box"></i>
                        <p>No hay datos de entidades</p>
                    </div>
                </div>
            </section>

            <!-- 5. Uso de Recursos (control silencioso) - Lateral Derecho -->
            <aside class="living-resources">
                <div class="living-resources-card">
                    <div class="resources-header">
                        <h3 class="resources-title">Recursos</h3>
                    </div>
                    <div class="resources-content" id="tokensResources">
                        <div class="resource-item">
                            <span class="resource-label">Disponibles</span>
                            <span class="resource-value" id="tokensAvailable">0</span>
                        </div>
                        <div class="resource-item">
                            <span class="resource-label">Usados</span>
                            <span class="resource-value" id="tokensUsed">0</span>
                        </div>
                        <div class="resource-item">
                            <span class="resource-label">Total</span>
                            <span class="resource-value" id="tokensTotal">0</span>
                        </div>
                        <div class="resource-progress">
                            <div class="resource-progress-bar">
                                <div class="resource-progress-fill" id="tokensProgressFill"></div>
                            </div>
                            <div class="resource-progress-text" id="tokensPercentage">0%</div>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </main>
