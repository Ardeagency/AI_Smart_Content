    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <button class="header-sidebar-toggle" id="headerSidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-left">
                <div class="logo-section">
                    <div class="title-section">
                        <h1 id="headerRoute">Living</h1>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="header-credits" id="headerCredits">
                    <span class="header-credits-value" id="headerCreditsValue">0/0</span>
                </div>
                <div class="header-avatar" id="headerAvatar">
                    <div class="avatar-circle" id="avatarCircle">
                        <span class="avatar-initials" id="avatarInitials">M</span>
                    </div>
                </div>
                <button class="hamburger-menu" id="hamburgerMenu">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content">
        <div class="living-container">
            <!-- 1️⃣ HERO - Producción Protagonista -->
            <section class="living-hero-section">
                <div class="living-hero" id="livingHero">
                    <!-- Una sola producción dominante se genera aquí -->
                </div>
            </section>

            <!-- 2️⃣ HISTORIAL VIVO - Últimas Producciones -->
            <section class="living-history-section">
                <div class="living-history-header">
                    <h2 class="living-section-title">Historial vivo</h2>
                    <p class="living-section-subtitle">Lo que has estado creando</p>
                </div>
                <div class="living-history-scroll" id="livingHistoryScroll">
                    <!-- Cards horizontales se generan aquí -->
                </div>
            </section>

            <!-- 3️⃣ BLOQUE DE CONTROL CREATIVO - Insights -->
            <section class="living-control-section">
                <div class="living-control-header">
                    <h2 class="living-section-title">Control creativo</h2>
                    <p class="living-section-subtitle">Así está funcionando tu máquina creativa</p>
                </div>
                <div class="living-control-grid" id="livingControlGrid">
                    <!-- Tarjetas compactas con insights se generan aquí -->
                </div>
            </section>

            <!-- 4️⃣ DESTACADOS INTELIGENTES - Curaduría del Sistema -->
            <section class="living-highlights-section">
                <div class="living-highlights-header">
                    <h2 class="living-section-title">Destacados inteligentes</h2>
                    <p class="living-section-subtitle">Curaduría del sistema</p>
                </div>
                <div class="living-highlights-scroll" id="livingHighlightsScroll">
                    <!-- Cards de destacados se generan aquí -->
                </div>
            </section>

            <!-- 5️⃣ RECURSOS - Estado del Sistema (Secundario) -->
            <section class="living-resources-section">
                <div class="living-resources" id="livingResources">
                    <!-- Recursos secundarios se generan aquí -->
                </div>
            </section>
        </div>
    </main>
