    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <button class="header-sidebar-toggle" id="headerSidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-left">
                <div class="logo-section">
                    <div class="title-section">
                        <h1 id="headerRoute">Living</h1>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="header-credits" id="headerCredits">
                    <span class="header-credits-value" id="headerCreditsValue">0/0</span>
                </div>
                <div class="header-avatar" id="headerAvatar">
                    <div class="avatar-circle" id="avatarCircle">
                        <span class="avatar-initials" id="avatarInitials">M</span>
                    </div>
                </div>
                <button class="hamburger-menu" id="hamburgerMenu">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content living-main-content">
        <div class="living-container">
            <!-- Category Selection Bar -->
            <section class="living-categories-section">
                <div class="living-categories-bar" id="livingCategoriesBar">
                    <button class="category-btn active" data-category="all">
                        <i class="fas fa-fire"></i>
                        <span>Todas</span>
                    </button>
                    <button class="category-btn" data-category="image">
                        <i class="fas fa-image"></i>
                        <span>Imágenes</span>
                    </button>
                    <button class="category-btn" data-category="video">
                        <i class="fas fa-video"></i>
                        <span>Videos</span>
                    </button>
                    <button class="category-btn" data-category="reel">
                        <i class="fas fa-film"></i>
                        <span>Reels</span>
                    </button>
                    <button class="category-btn" data-category="product">
                        <i class="fas fa-box"></i>
                        <span>Productos</span>
                    </button>
                    <button class="category-btn" data-category="brand">
                        <i class="fas fa-tag"></i>
                        <span>Marcas</span>
                    </button>
                </div>
            </section>

            <!-- Grid Unificado de Producciones -->
            <section class="living-grid-section">
                <div class="living-grid" id="livingGrid">
                    <!-- Todas las cards de producción se generan aquí -->
                </div>
            </section>
        </div>
    </main>
