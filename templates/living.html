    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <button class="header-sidebar-toggle" id="headerSidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-left">
                <div class="logo-section">
                    <div class="title-section">
                        <h1 id="headerRoute">Living</h1>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="header-credits" id="headerCredits">
                    <span class="header-credits-value" id="headerCreditsValue">0/0</span>
                </div>
                <div class="header-avatar" id="headerAvatar">
                    <div class="avatar-circle" id="avatarCircle">
                        <span class="avatar-initials" id="avatarInitials">M</span>
                    </div>
                </div>
                <button class="hamburger-menu" id="hamburgerMenu">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content">
        <div class="living-container">
            <!-- Grid Principal -->
            <div class="living-dashboard-grid">
                
                <!-- Card 1: Uso de Tokens -->
                <div class="living-card tokens-card">
                    <div class="card-header">
                        <h2>Uso de Tokens</h2>
                    </div>
                    <div class="card-content">
                        <div class="tokens-visualization" id="tokensVisualization">
                            <div class="tokens-stats">
                                <div class="token-stat">
                                    <span class="token-label">Usados</span>
                                    <span class="token-value" id="tokensUsed">0</span>
                                </div>
                                <div class="token-stat">
                                    <span class="token-label">Disponibles</span>
                                    <span class="token-value" id="tokensAvailable">0</span>
                                </div>
                                <div class="token-stat">
                                    <span class="token-label">Total</span>
                                    <span class="token-value" id="tokensTotal">0</span>
                                </div>
                            </div>
                            <div class="tokens-progress-bar">
                                <div class="tokens-progress-fill" id="tokensProgressFill"></div>
                            </div>
                            <div class="tokens-percentage" id="tokensPercentage">0%</div>
                        </div>
                    </div>
                </div>

                <!-- Card 2: 3 Imágenes del Día -->
                <div class="living-card images-card">
                    <div class="card-header">
                        <h2>Imágenes del Día</h2>
                    </div>
                    <div class="card-content">
                        <div class="images-of-day" id="imagesOfDay">
                            <div class="empty-state">
                                <i class="fas fa-images"></i>
                                <p>No hay imágenes generadas hoy</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Card 3: Producto Favorito -->
                <div class="living-card favorite-product-card">
                    <div class="card-header">
                        <h2>Producto Favorito</h2>
                    </div>
                    <div class="card-content">
                        <div class="favorite-product" id="favoriteProduct">
                            <div class="empty-state">
                                <i class="fas fa-star"></i>
                                <p>No hay producto favorito</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Card 4: Producto con Mayor Producción -->
                <div class="living-card top-production-card">
                    <div class="card-header">
                        <h2>Mayor Producción</h2>
                    </div>
                    <div class="card-content">
                        <div class="top-production-product" id="topProductionProduct">
                            <div class="empty-state">
                                <i class="fas fa-chart-line"></i>
                                <p>No hay producciones registradas</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Card 5: Últimas Producciones (Full Width) -->
                <div class="living-card latest-productions-card full-width">
                    <div class="card-header">
                        <h2>Últimas Producciones</h2>
                    </div>
                    <div class="card-content">
                        <div class="productions-list" id="productionsList">
                            <div class="empty-state">
                                <i class="fas fa-file-alt"></i>
                                <p>No hay producciones recientes</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
