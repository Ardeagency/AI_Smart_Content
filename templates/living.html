    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <button class="header-sidebar-toggle" id="headerSidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-left">
                <div class="logo-section">
                    <div class="title-section">
                        <h1 id="headerRoute">Living</h1>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="header-credits" id="headerCredits">
                    <span class="header-credits-value" id="headerCreditsValue">0/0</span>
                </div>
                <div class="header-avatar" id="headerAvatar">
                    <div class="avatar-circle" id="avatarCircle">
                        <span class="avatar-initials" id="avatarInitials">M</span>
                    </div>
                </div>
                <button class="hamburger-menu" id="hamburgerMenu">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content">
        <div class="living-container">
            <!-- Header Grande con Degradado -->
            <div class="living-hero-header">
                <div class="living-hero-background">
                    <div class="living-hero-gradient"></div>
                </div>
                <div class="living-hero-content">
                    <!-- Columna Izquierda: Producciones del Día -->
                    <div class="living-hero-left">
                        <h2 class="living-hero-title">Producciones del Día</h2>
                        <div class="living-productions-day" id="productionsOfDay">
                            <div class="production-day-item">
                                <div class="production-day-placeholder">
                                    <i class="fas fa-image"></i>
                                </div>
                            </div>
                            <div class="production-day-item">
                                <div class="production-day-placeholder">
                                    <i class="fas fa-image"></i>
                                </div>
                            </div>
                            <div class="production-day-item">
                                <div class="production-day-placeholder">
                                    <i class="fas fa-image"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Columna Derecha: Tokens -->
                    <div class="living-hero-right">
                        <h2 class="living-hero-title">Uso de Tokens</h2>
                        <div class="living-tokens-hero" id="tokensHero">
                            <div class="tokens-hero-stats">
                                <div class="token-hero-stat">
                                    <span class="token-hero-label">Usados</span>
                                    <span class="token-hero-value" id="tokensUsedHero">0</span>
                                </div>
                                <div class="token-hero-stat">
                                    <span class="token-hero-label">Disponibles</span>
                                    <span class="token-hero-value" id="tokensAvailableHero">0</span>
                                </div>
                                <div class="token-hero-stat">
                                    <span class="token-hero-label">Total</span>
                                    <span class="token-hero-value" id="tokensTotalHero">0</span>
                                </div>
                            </div>
                            <div class="tokens-hero-progress">
                                <div class="tokens-hero-progress-bar">
                                    <div class="tokens-hero-progress-fill" id="tokensProgressFillHero"></div>
                                </div>
                                <div class="tokens-hero-percentage" id="tokensPercentageHero">0% usado</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sección: Últimas Producciones -->
            <div class="living-productions-section">
                <div class="living-productions-header">
                    <h2 class="living-productions-title">Últimas Producciones</h2>
                </div>
                <div class="living-productions-content" id="productionsList">
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>No hay producciones recientes</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
