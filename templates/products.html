    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <button class="header-sidebar-toggle" id="headerSidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="header-left">
                <div class="logo-section">
                    <div class="title-section">
                        <h1 id="headerRoute">Productos</h1>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="header-credits" id="headerCredits">
                    <span class="header-credits-value" id="headerCreditsValue">0/0</span>
                </div>
                <div class="header-avatar" id="headerAvatar">
                    <div class="avatar-circle" id="avatarCircle">
                        <span class="avatar-initials" id="avatarInitials">M</span>
                    </div>
                </div>
                <button class="hamburger-menu" id="hamburgerMenu">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <div class="main-content">
        <div class="products-container">
            <!-- Main Content -->
            <div class="products-main">
                <!-- Page Header -->
                <div class="page-header">
                    <div class="page-header-top">
                        <div id="categoryTabs" class="category-tabs">
                            <!-- Tabs will be inserted here by JavaScript -->
                        </div>
                        <button class="btn-primary btn-add-product" id="addProductBtn">
                            <i class="fas fa-plus"></i>
                            <span>Nuevo Producto</span>
                        </button>
                    </div>
                </div>

                <!-- Products Gallery -->
            <div class="products-gallery" id="productsGallery">
                <!-- Empty State -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <i class="fas fa-box-open"></i>
                    <h3>No hay productos</h3>
                    <p>Aún no has creado ningún producto</p>
                    <button class="btn-primary" onclick="document.getElementById('addProductBtn').click()">
                        <i class="fas fa-plus"></i>
                        Crear Primer Producto
                    </button>
                </div>

                <!-- Products Grid -->
                <div class="products-grid" id="productsGrid" style="display: none;">
                    <!-- Products will be inserted here -->
                </div>
            </div>
        </div>
    </div>
