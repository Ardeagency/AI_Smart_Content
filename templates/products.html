    <!-- Contenido Principal -->
    <div class="main-content">
        <div class="products-container">
            <!-- Main Content -->
            <div class="products-main">
                <!-- Page Header -->
                <div class="page-header">
                    <div class="page-header-top">
                        <div id="categoryTabs" class="category-tabs">
                            <!-- Tabs will be inserted here by JavaScript -->
                        </div>
                        <button class="btn-primary btn-add-product" id="addProductBtn">
                            <i class="fas fa-plus"></i>
                            <span>Nuevo Producto</span>
                        </button>
                    </div>
                </div>

                <!-- Products Gallery -->
            <div class="products-gallery" id="productsGallery">
                <!-- Loading State -->
                <div class="loading-state" id="loadingState">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Cargando productos...</p>
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <i class="fas fa-box-open"></i>
                    <h3>No hay productos</h3>
                    <p>Aún no has creado ningún producto</p>
                    <button class="btn-primary" onclick="document.getElementById('addProductBtn').click()">
                        <i class="fas fa-plus"></i>
                        Crear Primer Producto
                    </button>
                </div>

                <!-- Products Grid -->
                <div class="products-grid" id="productsGrid" style="display: none;">
                    <!-- Products will be inserted here -->
                </div>
            </div>
        </div>
    </div>
