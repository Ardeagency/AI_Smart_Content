    <!-- Contenido Principal -->
    <div class="main-content">
        <div class="products-container">
            <!-- Main Content -->
            <div class="products-main">
                <!-- Page Header: filtros tipo Controls (segmentados por tipo_producto) -->
                <div class="page-header">
                    <div class="page-header-top">
                        <div class="products-controls">
                            <h3 class="products-controls-title">Tipo de producto</h3>
                            <div id="categoryTabs" class="products-controls-segments" role="group" aria-label="Filtrar por tipo de producto">
                                <!-- Segmentos (tipo_producto) insertados por JavaScript -->
                            </div>
                        </div>
                        <button class="btn-primary btn-add-product" id="addProductBtn">
                            <i class="fas fa-plus"></i>
                            <span>Nuevo Producto</span>
                        </button>
                    </div>
                </div>

                <!-- Products Gallery -->
            <div class="products-gallery" id="productsGallery">
                <!-- Empty State -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <i class="fas fa-box-open"></i>
                    <h3>No hay productos</h3>
                    <p>Aún no has creado ningún producto</p>
                    <button class="btn-primary" onclick="document.getElementById('addProductBtn').click()">
                        <i class="fas fa-plus"></i>
                        Crear Primer Producto
                    </button>
                </div>

                <!-- Products Grid -->
                <div class="products-grid" id="productsGrid" style="display: none;">
                    <!-- Products will be inserted here -->
                </div>
            </div>
        </div>
    </div>
