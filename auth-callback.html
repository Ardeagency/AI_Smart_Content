<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticando - UGC Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: white;
        }

        .auth-container {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }

        .loading-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #FD624F, #FF8A75);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #FD624F;
        }

        .auth-message {
            font-size: 1rem;
            color: #999;
            margin-bottom: 2rem;
        }

        .auth-steps {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .step {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            transition: background 0.3s;
        }

        .step.active {
            background: #FD624F;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            color: #ef4444;
        }

        .retry-button {
            background: #FD624F;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.3s;
        }

        .retry-button:hover {
            background: #e55548;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="loading-icon">
            <i class="fas fa-user-check"></i>
        </div>
        <h1 class="auth-title">Completando autenticación</h1>
        <p class="auth-message" id="authMessage">Verificando credenciales y configurando tu cuenta...</p>
        
        <div class="auth-steps">
            <div class="step active" id="step1"></div>
            <div class="step" id="step2"></div>
            <div class="step" id="step3"></div>
        </div>

        <div class="error-message" id="errorContainer" style="display: none;">
            <p id="errorMessage"></p>
            <button class="retry-button" onclick="retryAuth()">
                <i class="fas fa-redo"></i>
                Reintentar
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app-state.js"></script>
    
    <script>
        class AuthCallback {
            constructor() {
                this.currentStep = 1;
                this.init();
            }

            init() {
                console.log('🔄 Iniciando procesamiento de auth callback...');
                this.updateStep(1, 'Verificando autenticación...');
                
                // Wait a bit for all scripts to load
                setTimeout(() => {
                    this.processAuthCallback();
                }, 1000);
            }

            updateStep(step, message) {
                this.currentStep = step;
                document.getElementById('authMessage').textContent = message;
                
                // Update step indicators
                for (let i = 1; i <= 3; i++) {
                    const stepEl = document.getElementById(`step${i}`);
                    if (i <= step) {
                        stepEl.classList.add('active');
                    } else {
                        stepEl.classList.remove('active');
                    }
                }
            }

            async processAuthCallback() {
                try {
                    this.updateStep(2, 'Obteniendo información del usuario...');

                    // Wait for Supabase to be ready
                    if (!window.supabaseClient) {
                        await this.waitForSupabase();
                    }

                    // Get session from Supabase
                    const { data: session, error } = await window.supabaseClient.supabase.auth.getSession();
                    
                    if (error) {
                        throw new Error(`Error obteniendo sesión: ${error.message}`);
                    }

                    if (!session?.session?.user) {
                        throw new Error('No se encontró información del usuario');
                    }

                    const user = session.session.user;
                    console.log('✅ Usuario autenticado:', user.email);

                    this.updateStep(3, 'Verificando configuración del usuario...');

                    // Check if it's first login
                    const isFirstLogin = await this.checkIfFirstLogin(user.id);
                    
                    // Store user info
                    if (window.AppState) {
                        window.AppState.login({
                            id: user.id,
                            email: user.email,
                            name: user.user_metadata?.full_name || user.email
                        });
                    }

                    // Track login event
                    try {
                        if (window.analyticsEngine && typeof window.analyticsEngine.track === 'function') {
                            const eventType = isFirstLogin ? 'first_login_social' : 'returning_user_login_social';
                            window.analyticsEngine.track(eventType, {
                                user_id: user.id,
                                email: user.email,
                                provider: user.app_metadata?.provider || 'unknown'
                            });
                        }
                    } catch (error) {
                        console.warn('⚠️ Error en analytics tracking (social login):', error);
                    }

                    // Redirect based on first login status
                    if (isFirstLogin) {
                        console.log('🎯 Primer inicio de sesión social - redirigiendo a onboarding');
                        this.updateStep(3, 'Redirigiendo a configuración inicial...');
                        setTimeout(() => {
                            window.location.href = 'onboarding-new.html';
                        }, 1000);
                    } else {
                        console.log('👤 Usuario existente - redirigiendo a dashboard');
                        this.updateStep(3, 'Redirigiendo al panel...');
                        setTimeout(() => {
                            window.location.href = 'main-dashboard.html';
                        }, 1000);
                    }

                } catch (error) {
                    console.error('❌ Error en auth callback:', error);
                    this.showError(error.message);
                }
            }

            async waitForSupabase() {
                return new Promise((resolve, reject) => {
                    let attempts = 0;
                    const maxAttempts = 30; // 30 seconds

                    const checkSupabase = () => {
                        attempts++;
                        
                        if (window.supabaseClient?.isReady()) {
                            resolve();
                        } else if (attempts >= maxAttempts) {
                            reject(new Error('Timeout esperando Supabase'));
                        } else {
                            setTimeout(checkSupabase, 1000);
                        }
                    };

                    checkSupabase();
                });
            }

            async checkIfFirstLogin(userId) {
                try {
                    console.log('🔍 Verificando si es primer inicio de sesión para:', userId);

                    // Check projects table
                    const { data: projects, error: projectsError } = await window.supabaseClient.supabase
                        .from('projects')
                        .select('id')
                        .eq('user_id', userId)
                        .limit(1);

                    if (projectsError) {
                        console.error('❌ Error consultando proyectos:', projectsError);
                        // Try with admin client if available
                        const adminClient = window.supabaseClient.getAdminClient();
                        if (adminClient) {
                            const { data: adminProjects, error: adminError } = await adminClient
                                .from('projects')
                                .select('id')
                                .eq('user_id', userId)
                                .limit(1);
                            
                            if (!adminError) {
                                return !adminProjects || adminProjects.length === 0;
                            }
                        }
                        // In case of error, assume not first login
                        return false;
                    }

                    // If user has projects, check for products/brand
                    if (projects && projects.length > 0) {
                        const projectId = projects[0].id;
                        
                        const [productsResult, brandResult] = await Promise.all([
                            window.supabaseClient.supabase
                                .from('products')
                                .select('id')
                                .eq('project_id', projectId)
                                .limit(1),
                            window.supabaseClient.supabase
                                .from('brand_guidelines')
                                .select('id')
                                .eq('project_id', projectId)
                                .limit(1)
                        ]);

                        const hasProducts = productsResult.data && productsResult.data.length > 0;
                        const hasBrand = brandResult.data && brandResult.data.length > 0;

                        console.log('📊 Datos del usuario:', {
                            projects: projects.length,
                            products: hasProducts ? productsResult.data.length : 0,
                            brand: hasBrand ? brandResult.data.length : 0
                        });

                        return !(hasProducts || hasBrand);
                    }

                    console.log('🎯 Usuario sin proyectos - es primer inicio de sesión');
                    return true;

                } catch (error) {
                    console.error('❌ Error verificando primer login:', error);
                    // In case of error, assume not first login to avoid loops
                    return false;
                }
            }

            showError(message) {
                document.getElementById('errorMessage').textContent = message;
                document.getElementById('errorContainer').style.display = 'block';
                
                // Hide loading elements
                document.querySelector('.auth-steps').style.display = 'none';
            }
        }

        function retryAuth() {
            window.location.reload();
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new AuthCallback();
        });
    </script>
</body>
</html>
