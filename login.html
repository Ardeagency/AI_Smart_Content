<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Content - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- Contenedor principal -->
    <div class="auth-container">
        <!-- Formulario de autenticación -->
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <span>Your logo</span>
            </div>

            <!-- Formulario de Login -->
            <form class="auth-form active" id="loginForm" data-form="login">
                <h2>Login</h2>

                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <div class="input-container">
                        <input type="email" id="loginEmail" placeholder="username@gmail.com" required>
                    </div>
                </div>
                    
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-container">
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <button type="button" class="toggle-password" data-target="loginPassword">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-button">
                    <span class="button-text">Sign in</span>
                    <div class="loading-spinner" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>or continue with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-button google">
                    <i class="fab fa-google"></i>
                    <span>Google</span>
                </button>
            </div>

            <!-- Register Link -->
            <div class="register-link">
                <p>Don't have an account yet? <a href="planes.html">Register for free</a></p>
            </div>
        </div>

    </div>

    <!-- Notificaciones -->
    <div class="notification" id="notification">
        <div class="notification-content">
            <i class="notification-icon"></i>
            <span class="notification-message"></span>
        </div>
        <button class="notification-close">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
