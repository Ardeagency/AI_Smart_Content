<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscribirse - AI Smart Content</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/planes.css">
</head>
<body>
    <div class="subscribe-container">
        <!-- Main Card -->
        <div class="subscribe-card">
            <!-- Left Side - Form -->
            <div class="subscribe-form-section">
                <div class="form-header">
                    <span class="form-badge">COMENZAR GRATIS</span>
                    <h1 class="form-title">Crear nueva cuenta<span class="title-dot">.</span></h1>
                    <p class="form-subtitle">¿Ya eres miembro? <a href="login.html" class="login-link">Iniciar Sesión</a></p>
                </div>

                <!-- Plan Selection Cards -->
                <div class="plans-selection">
                    <div class="plan-card-small" data-plan="basico" data-credits="50" data-price="29">
                        <div class="plan-card-header">
                            <h3 class="plan-card-name">Básico</h3>
                            <div class="plan-card-price">$29<span>/mes</span></div>
                        </div>
                        <div class="plan-card-credits">50 créditos</div>
                    </div>

                    <div class="plan-card-small" data-plan="pro" data-credits="150" data-price="79">
                        <div class="plan-card-header">
                            <h3 class="plan-card-name">Pro</h3>
                            <div class="plan-card-price">$79<span>/mes</span></div>
                        </div>
                        <div class="plan-card-credits">150 créditos</div>
                    </div>

                    <div class="plan-card-small" data-plan="enterprise" data-credits="500" data-price="199">
                        <div class="plan-card-header">
                            <h3 class="plan-card-name">Enterprise</h3>
                            <div class="plan-card-price">$199<span>/mes</span></div>
                        </div>
                        <div class="plan-card-credits">500 créditos</div>
                    </div>
                </div>

                <!-- Registration Form -->
                <form class="registration-form" id="registrationForm">
                    <div class="form-group">
                        <label for="regFirstName">Nombre</label>
                        <div class="input-wrapper">
                            <input type="text" id="regFirstName" name="firstName" class="form-input" autocomplete="given-name" required>
                            <i class="fas fa-user input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regLastName">Apellido</label>
                        <div class="input-wrapper">
                            <input type="text" id="regLastName" name="lastName" class="form-input" autocomplete="family-name" required>
                            <i class="fas fa-user input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regEmail">Correo electrónico</label>
                        <div class="input-wrapper">
                            <input type="email" id="regEmail" name="email" class="form-input" autocomplete="email" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regPassword">Contraseña</label>
                        <div class="input-wrapper">
                            <input type="password" id="regPassword" name="password" class="form-input" autocomplete="new-password" required>
                            <i class="fas fa-eye input-icon password-toggle" id="passwordToggle"></i>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-change-method">Cambiar método</button>
                        <button type="submit" class="btn-create-account">Crear cuenta</button>
                    </div>
                </form>
            </div>

            <!-- Right Side - Background Image -->
            <div class="subscribe-image-section">
                <div class="image-overlay"></div>
                <div class="image-logo">
                    <i class="fas fa-brain"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/planes.js"></script>
</body>
</html>
