<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - AI Smart Content</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/products.css">
</head>
<body>
    <!-- Overlay de navegación -->
    <div class="nav-overlay" id="navOverlay" onclick="closeNavigation()"></div>

    <!-- Navegación lateral -->
    <nav class="side-navigation" id="sideNavigation">
        <!-- Header del panel -->
        <div class="nav-header">
            <div class="nav-user-info">
                <div class="nav-user-avatar" id="navUserAvatar">
                    <img id="navBrandLogo" src="" alt="Logo" style="display: none; width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                    <span id="navBrandInitials" style="display: block;">M</span>
                </div>
                <div class="nav-user-details">
                    <h4 id="navBrandName">Cargando marca...</h4>
                    <div class="nav-user-plan" id="navUserPlan">
                        <i class="fas fa-crown"></i>
                        <span id="navPlanName">Plan Básico</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Menú Principal -->
        <div class="nav-menu">
            <div class="nav-section">
                <div class="nav-section-title">Principal</div>
                <div class="nav-item">
                    <a href="living.html" class="nav-link">
                        <i class="fas fa-home nav-icon"></i>
                        <span class="nav-text">Living</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="studio.html" class="nav-link">
                        <i class="fas fa-magic nav-icon"></i>
                        <span class="nav-text">Studio</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="products.html" class="nav-link active">
                        <i class="fas fa-box nav-icon"></i>
                        <span class="nav-text">Productos</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Footer del panel -->
        <div class="nav-footer">
            <button class="nav-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                <span>Cerrar Sesión</span>
                </button>
        </div>
    </nav>

    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo-section">
                    <div class="title-section">
                        <h1>Productos</h1>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="header-credits" id="headerCredits">
                    <i class="fas fa-coins header-credits-icon"></i>
                    <div class="header-credits-text">
                        <span class="header-credits-label">Créditos</span>
                        <span class="header-credits-value" id="headerCreditsValue">0</span>
                    </div>
                </div>
                <button class="hamburger-menu" id="hamburgerMenu">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content">
        <div class="products-container">
            <!-- Main Content -->
            <div class="products-main">
                <!-- Page Header -->
                <div class="page-header">
                <div class="page-title-section">
                    <h1 class="page-title">
                        Mis Productos
                    </h1>
                    <p class="page-subtitle">Gestiona y edita tus productos</p>
                </div>
                <button class="btn-primary btn-add-product" id="addProductBtn">
                    <i class="fas fa-plus"></i>
                    <span>Nuevo Producto</span>
                </button>
            </div>

            <!-- Products Gallery -->
            <div class="products-gallery" id="productsGallery">
                <!-- Loading State -->
                <div class="loading-state" id="loadingState">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Cargando productos...</p>
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <i class="fas fa-box-open"></i>
                    <h3>No hay productos</h3>
                    <p>Aún no has creado ningún producto</p>
                    <button class="btn-primary" onclick="document.getElementById('addProductBtn').click()">
                        <i class="fas fa-plus"></i>
                        Crear Primer Producto
                    </button>
                </div>

                <!-- Products Grid -->
                <div class="products-grid" id="productsGrid" style="display: none;">
                    <!-- Products will be inserted here -->
                </div>
            </div>

            <!-- Sidebar de Productos -->
            <aside class="products-sidebar" id="productsSidebar">
                <div class="sidebar-header">
                    <h2 class="sidebar-title" id="sidebarTitle">Detalles del Producto</h2>
                    <button class="sidebar-close" id="sidebarClose">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="sidebar-content" id="sidebarContent">
                    <!-- Content will be loaded dynamically -->
                </div>
            </aside>

            <!-- Sidebar Overlay -->
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/products.js"></script>
    
    <!-- Funciones de navegación -->
    <script>
        // Funciones para la navegación lateral
        // En desktop, el sidebar está siempre abierto
        function toggleNavigation() {
            // Solo funciona en móvil
            if (window.innerWidth <= 768) {
                const overlay = document.getElementById('navOverlay');
                const navigation = document.getElementById('sideNavigation');
                const hamburger = document.getElementById('hamburgerMenu');
                
                overlay.classList.toggle('active');
                navigation.classList.toggle('active');
                if (hamburger) hamburger.classList.toggle('active');
            }
        }

        function closeNavigation() {
            // Solo funciona en móvil
            if (window.innerWidth <= 768) {
                const overlay = document.getElementById('navOverlay');
                const navigation = document.getElementById('sideNavigation');
                const hamburger = document.getElementById('hamburgerMenu');
                
                overlay.classList.remove('active');
                navigation.classList.remove('active');
                if (hamburger) hamburger.classList.remove('active');
            }
        }
        
        // Inicializar sidebar como abierto en desktop
        document.addEventListener('DOMContentLoaded', function() {
            if (window.innerWidth > 768) {
                const navigation = document.getElementById('sideNavigation');
                if (navigation) {
                    navigation.classList.add('active');
                }
            }
        });
    </script>
</body>
</html>
