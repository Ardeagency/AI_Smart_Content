<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos del Usuario - UGC STUDIO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="form-page">
    <div class="app-container">
        <!-- Header de Configuración -->
        <header class="config-header">
            <div class="container">
                <div class="header-content">
                    <div class="logo">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                        <span class="logo-text">UGC STUDIO</span>
                    </div>
                        <div class="progress-indicator">
                            <span class="progress-text">Registro de Usuario</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 100%"></div>
                            </div>
                        </div>
                </div>
            </div>
        </header>


        <!-- Contenido Principal -->
        <main class="main-content">
            <div class="container">
                <div class="form-container">
                    <div class="form-header">
                        <h1 class="form-title">Registro de Usuario</h1>
                        <p class="form-description">Crea tu cuenta para acceder a UGC STUDIO y comenzar a generar contenido</p>
                    </div>

                    <form class="data-form" id="userDataForm">
                        <!-- Información Personal -->
                        <section class="form-section">
                            <h2 class="section-title">
                                <i class="fas fa-user"></i>
                                Información Personal
                            </h2>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="nombre" class="form-label required">Nombre</label>
                                    <input type="text" id="nombre" name="nombre" class="form-input" required>
                                    <span class="form-hint">Tu nombre de pila</span>
                                </div>
                                <div class="form-group">
                                    <label for="apellido" class="form-label">Apellido</label>
                                    <input type="text" id="apellido" name="apellido" class="form-input">
                                    <span class="form-hint">Tu apellido (opcional)</span>
                                </div>
                                <div class="form-group">
                                    <label for="correo" class="form-label required">Correo Electrónico</label>
                                    <input type="email" id="correo" name="correo" class="form-input" required>
                                    <span class="form-hint">Será tu usuario de acceso</span>
                                </div>
                                <div class="form-group">
                                    <label for="contrasena" class="form-label required">Contraseña</label>
                                    <div class="password-input">
                                        <input type="password" id="contrasena" name="contrasena" class="form-input" required>
                                        <button type="button" class="password-toggle" onclick="togglePassword('contrasena')">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                    <span class="form-hint">Mínimo 6 caracteres</span>
                                </div>
                                <div class="form-group">
                                    <label for="confirmar_contrasena" class="form-label required">Confirmar Contraseña</label>
                                    <div class="password-input">
                                        <input type="password" id="confirmar_contrasena" name="confirmar_contrasena" class="form-input" required>
                                        <button type="button" class="password-toggle" onclick="togglePassword('confirmar_contrasena')">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                    <span class="form-hint">Repite tu contraseña</span>
                                </div>
                            </div>
                        </section>





                        <!-- Botones de Navegación -->
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="window.location.href='datos-marca.html'">
                                <i class="fas fa-arrow-left"></i>
                                Volver a Marca
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-check"></i>
                                Crear Cuenta y Finalizar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-api.js"></script>
    <script src="js/context-manager.js"></script>
    <script src="js/validation-manager.js"></script>
    <script src="js/navigation-manager.js"></script>
    <script src="js/main.js"></script>
    <script src="js/user-data-form.js"></script>
</body>
</html>
