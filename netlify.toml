# - OPENAI_API_KEY (solo para backend: funciones que llamen a OpenAI)
# - KIE_API_KEY (solo para backend: funciones que llamen a KIE)

# Netlify Configuration for AI Smart Content (SPA)

[build]
  # No build command needed for static site
  publish = "."

[functions]
  # Directorio de Netlify Functions en la raíz (evita 404 si Netlify no detecta netlify/functions)
  directory = "functions"
  # En Dashboard: KLING_ACCESS_KEY (o KLING_ACCESSS_KEY), KLING_SECRET_KEY

# Excluir archivos estáticos del redirect SPA
# Netlify procesa los redirects en orden, el primero que coincide gana.
# IMPORTANTE: Las funciones deben matchear ANTES que el fallback /* para no devolver index.html.

# Rutas /api/* reescriben a las funciones (alternativa por si /.netlify/functions/* da 404)
[[redirects]]
  from = "/api/kling-video"
  to = "/.netlify/functions/kling-video"
  status = 200
  force = true

[[redirects]]
  from = "/api/kie-video-download"
  to = "/.netlify/functions/kie-video-download"
  status = 200
  force = true

# Netlify Functions — path directo
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Archivos JS - servir directamente
[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200

# Archivos CSS - servir directamente
[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

# Templates HTML - servir directamente
[[redirects]]
  from = "/templates/*"
  to = "/templates/:splat"
  status = 200

# Recursos/imágenes - servir directamente
[[redirects]]
  from = "/recursos/*"
  to = "/recursos/:splat"
  status = 200

# Favicons - servir directamente (evitar que el SPA fallback devuelva index.html)
[[redirects]]
  from = "/favicons/*"
  to = "/favicons/:splat"
  status = 200

# SQL files - servir directamente
[[redirects]]
  from = "/SQL/*"
  to = "/SQL/:splat"
  status = 200

# SPA Fallback - todas las demás rutas van a index.html (/.netlify/* ya cubierto arriba)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers globales para FFmpeg.wasm (SharedArrayBuffer requiere COOP/COEP)
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

# Headers para las funciones
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# Headers para templates (cache)
[[headers]]
  for = "/templates/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Headers para favicons (cache largo, son estáticos)
[[headers]]
  for = "/favicons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Variables de entorno deben configurarse en Netlify Dashboard:
# - SUPABASE_DATABASE_URL
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY (solo para backend, no se expone)
# - SUPABASE_JWT_SECRET (solo para backend, no se expone)

