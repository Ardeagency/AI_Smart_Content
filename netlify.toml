# - OPENAI_API_KEY (solo para backend: funciones que llamen a OpenAI)
# - KIE_API_KEY (solo para backend: funciones que llamen a KIE)

# Netlify Configuration for AI Smart Content (SPA)

[build]
  # No build command needed for static site
  publish = "."

[functions]
  # Directorio donde están las Netlify Functions
  directory = "netlify/functions"

# Excluir archivos estáticos del redirect SPA
# Netlify procesa los redirects en orden, el primero que coincide gana.
# IMPORTANTE: index.html debe usar rutas absolutas (/js/..., /css/...) para que,
# al entrar por /signin, /landing, etc., el navegador pida /js/app-loader.js (no
# /signin/js/app-loader.js); así esta regla sirve el .js y no el fallback index.html.

# Archivos JS - servir directamente
[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200

# Archivos CSS - servir directamente
[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

# Templates HTML - servir directamente
[[redirects]]
  from = "/templates/*"
  to = "/templates/:splat"
  status = 200

# Recursos/imágenes - servir directamente
[[redirects]]
  from = "/recursos/*"
  to = "/recursos/:splat"
  status = 200

# Favicons - servir directamente (evitar que el SPA fallback devuelva index.html)
[[redirects]]
  from = "/favicons/*"
  to = "/favicons/:splat"
  status = 200

# SQL files - servir directamente
[[redirects]]
  from = "/SQL/*"
  to = "/SQL/:splat"
  status = 200

# Netlify Functions - no redirigir
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200

# SPA Fallback - todas las demás rutas van a index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers para las funciones
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, OPTIONS"

# Headers para templates (cache)
[[headers]]
  for = "/templates/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Headers para favicons (cache largo, son estáticos)
[[headers]]
  for = "/favicons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Variables de entorno deben configurarse en Netlify Dashboard:
# - SUPABASE_DATABASE_URL
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY (solo para backend, no se expone)
# - SUPABASE_JWT_SECRET (solo para backend, no se expone)

