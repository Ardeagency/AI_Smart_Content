  to = "/.netlify/functions/api-vera-pending-actions"
  status = 200
  force = true

[[redirects]]
  from = "/api/vera/pending-actions/*"
  to = "/.netlify/functions/api-vera-pending-actions"
  status = 200
  force = true

# Shopify webhooks — catch-all 2 segmentos (resource/action).
# Topics: products/{create,update,delete}, orders/{create,updated,cancelled},
#         customers/{create,update,delete,data_request,redact}, shop/redact, app/uninstalled
[[redirects]]
  from = "/api/webhooks/shopify/*"
  to = "/.netlify/functions/api-webhooks-shopify"
  status = 200
  force = true

[[redirects]]
  from = "/api/webhooks/meta"
  to = "/.netlify/functions/api-webhooks-meta"
  status = 200
  force = true

[[redirects]]
  from = "/api/webhooks/instagram"
  to = "/.netlify/functions/api-webhooks-meta"
  status = 200
  force = true

# Service Worker - servir directamente desde raíz (scope: '/')
[[redirects]]
  from = "/sw.js"
  to = "/sw.js"
  status = 200

# PWA manifest - servir desde raíz para que el browser lo encuentre vía
# <link rel="manifest" href="/manifest.webmanifest">
[[redirects]]
  from = "/manifest.webmanifest"
  to = "/manifest.webmanifest"
  status = 200

# SEO: robots.txt y sitemap.xml en la raíz, sin caer al SPA fallback.
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# Offline fallback (precacheado por el Service Worker en install).
# El SW lo sirve cuando una navegación falla por red; este redirect
# garantiza que un GET directo a /offline.html también funcione.
[[redirects]]
  from = "/offline.html"
  to = "/offline.html"
  status = 200

# Archivos JS - servir directamente
[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200

# Archivos CSS - servir directamente
[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

# Recursos/imágenes - servir directamente
[[redirects]]
  from = "/recursos/*"
  to = "/recursos/:splat"
  status = 200

# Favicons - redirige ruta legacy a nueva ubicación dentro de recursos/
[[redirects]]
  from = "/favicons/*"
  to = "/recursos/favicons/:splat"
  status = 301

# SQL files - bloqueado: no exponer esquema de base de datos públicamente
[[redirects]]
  from = "/SQL/*"
  to = "/index.html"
  status = 404
  force = true

# SPA Fallback - todas las demás rutas van a index.html (/.netlify/* ya cubierto arriba)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cabeceras de seguridad globales para todos los recursos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cabeceras de seguridad adicionales para HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self' https: data:; media-src 'self' blob: https:; frame-ancestors 'none'; object-src 'none';"

[[headers]]
  for = "/index.html"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self' https: data:; media-src 'self' blob: https:; frame-ancestors 'none'; object-src 'none';"

# Headers para las funciones.
# NOTA: `Access-Control-Allow-Origin` ahora lo fija cada función en su respuesta
# (ver functions/lib/ai-shared.js `corsHeaders(event)`), con allow-list estricta
# para endpoints con auth. No se declara aquí para no forzar `*` en todo.
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Hub-Signature-256"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Cache-Control = "no-store"

# Favicons — cache largo
[[headers]]
  for = "/recursos/favicons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Web fonts (Font Awesome subset) — cache largo, immutable.
# Si cambia el set de íconos, regenerar subset y bump del path para invalidar.
[[headers]]
  for = "/recursos/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imágenes, logos, banners, vera:
# cache corto con revalidación para evitar que diseño/assets se queden pegados
# cuando se actualizan con el mismo nombre.
[[headers]]
  for = "/recursos/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# HTML de app shell y rutas SPA: siempre revalidar
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS/CSS críticos de la app:
# se sirven con revalidación obligatoria para evitar drift de versión en producción
# cuando algún query string ?v=... no se incrementa en un deploy.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service Worker — el browser DEBE revalidar siempre para detectar
# nuevas versiones; sin esto un SW "podrido" puede quedar pegado.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# PWA manifest — Content-Type explícito + revalidación corta.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "public, max-age=3600, must-revalidate"

# Variables de entorno deben configurarse en Netlify Dashboard:
# - SUPABASE_DATABASE_URL
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY (solo para backend, no se expone)
# - SUPABASE_JWT_SECRET (solo para backend, no se expone)
# - SITE_URL = https://aismartcontent.io  (sin barra final, determina la redirect_uri OAuth)
# - GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
# - GOOGLE_OAUTH_SCOPES = openid email profile https://www.googleapis.com/auth/analytics.readonly
# - META_APP_ID / META_APP_SECRET
# - FACEBOOK_OAUTH_SCOPES = pages_show_list,pages_read_engagement,pages_read_user_content,instagram_basic,instagram_manage_insights,read_insights,pages_manage_metadata
#   ↑ pages_manage_metadata es obligatorio para suscribirse a webhooks de página
#   ↑ instagram_manage_insights para webhooks de Instagram Business
#   ↑ pages_read_user_content para leer posts y comentarios orgánicos
#   (ads_read solo para campañas de pago — no aplica para contenido orgánico)
# - META_WEBHOOK_VERIFY_TOKEN = token secreto para validar webhook de Meta
# - OAUTH_STATE_SECRET = mínimo 32 bytes aleatorios en hex (para HMAC-signed state, previene CSRF)

