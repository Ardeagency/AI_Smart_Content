# Netlify Configuration for AI Smart Content (SPA)

[build]
  # No build command needed for static site
  publish = "."

[functions]
  # Directorio donde están las Netlify Functions
  directory = "netlify/functions"

# Redirects para SPA - Todas las rutas van a index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers para las funciones
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, OPTIONS"

# Headers para templates (cache)
[[headers]]
  for = "/templates/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Variables de entorno deben configurarse en Netlify Dashboard:
# - SUPABASE_DATABASE_URL
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY (solo para backend, no se expone)
# - SUPABASE_JWT_SECRET (solo para backend, no se expone)

