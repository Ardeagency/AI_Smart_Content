# - OPENAI_API_KEY (solo para backend: funciones que llamen a OpenAI)
# - KIE_API_KEY (solo para backend: funciones que llamen a KIE)

# Netlify Configuration for AI Smart Content (SPA)

[build]
  # Cache busting automático: reemplaza el placeholder __BUILD_ID__ por el SHA del
  # commit que está siendo deployado. Cada deploy genera un cache key único en
  # los `?v=...` de index.html, css/bundle.css y js/app.js, sin intervención manual.
  # COMMIT_REF lo expone Netlify; en local sin build, el placeholder permanece y
  # js/app.js cae a Date.now() en runtime para que tampoco haya cache stale en dev.
  command = "sed -i \"s/__BUILD_ID__/$COMMIT_REF/g\" index.html css/bundle.css js/app.js js/utils/lazy-nav.js sw.js"
  publish = "."

[functions]
  # Directorio de Netlify Functions en la raíz (evita 404 si Netlify no detecta netlify/functions)
  directory = "functions"
  # En Dashboard: KLING_ACCESS_KEY (o KLING_ACCESSS_KEY), KLING_SECRET_KEY

# Excluir archivos estáticos del redirect SPA
# Netlify procesa los redirects en orden, el primero que coincide gana.
# IMPORTANTE: Las funciones deben matchear ANTES que el fallback /* para no devolver index.html.

