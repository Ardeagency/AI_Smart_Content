# Netlify Functions — path directo
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Archivos JS - servir directamente
[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200

# Archivos CSS - servir directamente
[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

# Templates HTML - servir directamente
[[redirects]]
  from = "/templates/*"
  to = "/templates/:splat"
  status = 200

# Recursos/imágenes - servir directamente
[[redirects]]
  from = "/recursos/*"
  to = "/recursos/:splat"
  status = 200

# Favicons - servir directamente (evitar que el SPA fallback devuelva index.html)
[[redirects]]
  from = "/favicons/*"
  to = "/favicons/:splat"
  status = 200

# SQL files - servir directamente
[[redirects]]
  from = "/SQL/*"
  to = "/SQL/:splat"
  status = 200

# SPA Fallback - todas las demás rutas van a index.html (/.netlify/* ya cubierto arriba)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers para las funciones
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# Headers para templates (cache)
[[headers]]
  for = "/templates/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Headers para favicons (cache largo, son estáticos)
[[headers]]
  for = "/favicons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Variables de entorno deben configurarse en Netlify Dashboard:
# - SUPABASE_DATABASE_URL
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY (solo para backend, no se expone)
# - SUPABASE_JWT_SECRET (solo para backend, no se expone)
# - SITE_URL = https://aismartcontent.io  (sin barra final, determina la redirect_uri OAuth)
# - GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
# - GOOGLE_OAUTH_SCOPES = openid email profile https://www.googleapis.com/auth/analytics.readonly
# - META_APP_ID / META_APP_SECRET
# - FACEBOOK_OAUTH_SCOPES = ads_read,read_insights,pages_read_engagement
# - META_WEBHOOK_VERIFY_TOKEN = token secreto para validar webhook de Meta
# - OAUTH_STATE_SECRET = mínimo 32 bytes aleatorios en hex (para HMAC-signed state, previene CSRF)

