<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGC Studio - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .dashboard-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-primary);
        }
        
        .dashboard-card {
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(253, 98, 79, 0.1);
        }
        
        .dashboard-icon {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(253, 98, 79, 0.5));
        }
        
        .dashboard-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        
        .dashboard-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .dashboard-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }
        
        .dashboard-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .dashboard-btn:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary-color));
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(253, 98, 79, 0.4);
        }
        
        .dashboard-btn.outline {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }
        
        .dashboard-btn.outline:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .user-info {
            position: absolute;
            top: 30px;
            right: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .logout-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .logout-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- Partículas de fondo -->
    <div class="particles" id="particles"></div>
    
    <!-- Botón de logout -->
    <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
    </button>
    
    <!-- Info del usuario -->
    <div class="user-info" id="userInfo">
        <i class="fas fa-user"></i> <span id="userName">Cargando...</span>
    </div>
    
    <!-- Contenedor principal -->
    <div class="dashboard-container">
        <div class="dashboard-card">
            <div class="dashboard-icon">
                <i class="fas fa-rocket"></i>
            </div>
            
            <h1 class="dashboard-title">¡Dashboard en construcción!</h1>
            
            <p class="dashboard-subtitle">
                Tu dashboard estará disponible pronto. Mientras tanto, puedes crear un nuevo proyecto o gestionar tus configuraciones.
            </p>
            
            <div class="dashboard-actions">
                <a href="onboarding-new.html" class="dashboard-btn">
                    <i class="fas fa-plus"></i>
                    Crear Nuevo Proyecto
                </a>
                
                <button class="dashboard-btn outline" onclick="showUserProjects()">
                    <i class="fas fa-folder"></i>
                    Ver Proyectos
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        let authManager;
        
        // Inicializar página
        document.addEventListener('DOMContentLoaded', async () => {
            await waitForSupabase();
            await loadUserInfo();
            createParticles();
        });
        
        // Esperar a que Supabase esté disponible
        async function waitForSupabase() {
            let attempts = 0;
            while ((!window.supabaseClient || !window.supabaseClient.isReady()) && attempts < 30) {
                await new Promise(resolve => setTimeout(resolve, 500));
                attempts++;
            }
            
            if (!window.supabaseClient || !window.supabaseClient.isReady()) {
                console.error('Supabase no está disponible');
                window.location.href = 'login.html';
                return;
            }
        }
        
        // Cargar información del usuario
        async function loadUserInfo() {
            try {
                const { data: { session } } = await window.supabaseClient.supabase.auth.getSession();
                
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                
                const userName = session.user.user_metadata?.full_name || session.user.email;
                document.getElementById('userName').textContent = userName;
                
            } catch (error) {
                console.error('Error cargando usuario:', error);
                window.location.href = 'login.html';
            }
        }
        
        // Mostrar proyectos del usuario
        async function showUserProjects() {
            try {
                const { data: { session } } = await window.supabaseClient.supabase.auth.getSession();
                
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                
                const { data: projects, error } = await window.supabaseClient.supabase
                    .from('projects')
                    .select('id, name, created_at')
                    .eq('user_id', session.user.id)
                    .order('created_at', { ascending: false });
                
                if (error) {
                    alert('Error cargando proyectos: ' + error.message);
                    return;
                }
                
                if (projects.length === 0) {
                    alert('No tienes proyectos aún. ¡Crea tu primer proyecto!');
                } else {
                    const projectList = projects.map(p => 
                        `• ${p.name} (${new Date(p.created_at).toLocaleDateString()})`
                    ).join('\n');
                    
                    alert(`Tus proyectos:\n\n${projectList}`);
                }
                
            } catch (error) {
                console.error('Error:', error);
                alert('Error cargando proyectos');
            }
        }
        
        // Cerrar sesión
        async function logout() {
            try {
                await window.supabaseClient.supabase.auth.signOut();
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Error cerrando sesión:', error);
                window.location.href = 'login.html';
            }
        }
        
        // Crear partículas de fondo
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Posición inicial aleatoria
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                
                // Tamaño aleatorio
                const size = 1 + Math.random() * 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';

                particlesContainer.appendChild(particle);
            }
        }
    </script>
</body>
</html>
